name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      # --------------------------------------------------------
      # Windows build
      # --------------------------------------------------------
      - name: Setup MSBuild
        if: matrix.name == 'windows'
        uses: microsoft/setup-msbuild@v2


      - name: Generate Visual Studio project
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          .\vendor\premake5\premake5.exe vs2022


      - name: Build Windows
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          msbuild Project.sln `
            /p:Configuration=Distribution `
            /p:Platform=x64 `
            /m:1 `
            /v:minimal


      # --------------------------------------------------------
      # Linux build
      # --------------------------------------------------------
      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential


      - name: Generate Linux Makefiles
        if: matrix.name == 'linux'
        shell: bash
        run: |
          chmod +x vendor/premake5/premake5
          ./vendor/premake5/premake5 gmake2


      - name: Build Linux
        if: matrix.name == 'linux'
        shell: bash
        run: |
          make config=distribution


      # --------------------------------------------------------
      # Package Windows
      # --------------------------------------------------------
      - name: Package Windows
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          mkdir package-sdk
          mkdir package-sdk-only
          mkdir package-tool

          copy LICENSE package-sdk\
          copy LICENSE package-sdk-only\
          copy LICENSE package-tool\

          # Copy executable
          copy build\bin\StaticForgeTool\windows-x86_64\Distribution\StaticForgeTool.exe package-sdk\
          copy build\bin\StaticForgeTool\windows-x86_64\Distribution\StaticForgeTool.exe package-tool\

          if (Test-Path build\bin\StaticForgeTool\windows-x86_64\Distribution\StaticForgeTool.pdb) {
              copy build\bin\StaticForgeTool\windows-x86_64\Distribution\StaticForgeTool.pdb package-sdk\
          }

          # Copy headers
          mkdir package-sdk\include
          mkdir package-sdk-only\include

          robocopy StaticForgeCore\include package-sdk\include /E /XD Internal
          robocopy StaticForgeCore\include package-sdk-only\include /E /XD Internal

          $robocopyExitCode = $LASTEXITCODE

          if ($robocopyExitCode -gt 7) {
              exit $robocopyExitCode
          }

          # Reset PowerShell native exit state
          $global:LASTEXITCODE = 0

          # Copy libraries
          mkdir package-sdk\lib\x64
          mkdir package-sdk-only\lib\x64

          copy build\lib\StaticForgeCore\windows-x86_64\Distribution\StaticForgeCore.lib package-sdk\lib\x64\
          copy build\lib\StaticForgeCore\windows-x86_64\Distribution\StaticForgeCore.lib package-sdk-only\lib\x64\

          if (Test-Path build\lib\StaticForgeCore\windows-x86_64\Distribution\StaticForgeCore.pdb) {
              copy build\lib\StaticForgeCore\windows-x86_64\Distribution\StaticForgeCore.pdb package-sdk\lib\x64\
          }

          Compress-Archive `
            -Path package-sdk\* `
            -DestinationPath StaticForge-${{ github.ref_name }}-windows.zip

          Compress-Archive `
            -Path package-sdk-only\* `
            -DestinationPath StaticForgeSDK-${{ github.ref_name }}-windows.zip

          Compress-Archive `
            -Path package-tool\* `
            -DestinationPath StaticForgeTool-${{ github.ref_name }}-windows.zip

      # --------------------------------------------------------
      # Package Linux
      # --------------------------------------------------------
      - name: Package Linux
        if: matrix.name == 'linux'
        shell: bash
        run: |
          mkdir -p package-sdk/include
          mkdir -p package-sdk-only/include
          mkdir -p package-sdk/lib/x64
          mkdir -p package-sdk-only/lib/x64
          mkdir -p package-tool

          cp LICENSE package-sdk/
          cp LICENSE package-sdk-only/
          cp LICENSE package-tool/

          # Copy executable
          cp build/bin/StaticForgeTool/linux-x86_64/Distribution/StaticForgeTool package-sdk/
          cp build/bin/StaticForgeTool/linux-x86_64/Distribution/StaticForgeTool package-tool/

          # Copy headers
          rsync -a --exclude='Internal' StaticForgeCore/include/ package-sdk/include/
          rsync -a --exclude='Internal' StaticForgeCore/include/ package-sdk-only/include/

          # Copy libraries
          cp build/lib/StaticForgeCore/linux-x86_64/Distribution/libStaticForgeCore.a package-sdk/lib/x64/
          cp build/lib/StaticForgeCore/linux-x86_64/Distribution/libStaticForgeCore.a package-sdk-only/lib/x64/

          chmod +x package-sdk/StaticForgeTool
          chmod +x package-tool/StaticForgeTool

          tar -czf StaticForge-${{ github.ref_name }}-linux.tar.gz -C package-sdk .
          tar -czf StaticForgeSDK-${{ github.ref_name }}-linux.tar.gz -C package-sdk-only .
          tar -czf StaticForgeTool-${{ github.ref_name }}-linux.tar.gz -C package-tool .


      # --------------------------------------------------------
      # Upload build artifacts
      # --------------------------------------------------------
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: StaticForge-${{ matrix.name }}
          path: |
            StaticForge*.zip
            StaticForge*.tar.gz
          if-no-files-found: error


  # --------------------------------------------------------
  # Create GitHub Release
  # --------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz