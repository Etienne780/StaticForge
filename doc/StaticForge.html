    <div class="export-section__body"><h1>Getting Started</h1>
<p>StaticForge is an asset archive system for bundling and loading game files. It combines multiple files into a compact <code>.sfpak</code> container that can be efficiently read at runtime.</p>
<h2>What you get</h2>
<ul><li>A command-line tool (<code>StaticForgeTool</code>) to pack your assets during your build process</li><li>A C++ library (<code>StaticForgeCore</code>) to load assets from <code>.sfpak</code> files at runtime</li></ul>
<h2>Typical workflow</h2>
<ol><li>Organize your asset folders</li><li>Optionally add <code>.sfpak.meta</code> files to control how folders are grouped into archives</li><li>Run <code>StaticForgeTool</code> to pack your assets into one or more <code>.sfpak</code> files</li><li>At runtime, use <code>StaticForgeReader</code> and <code>StaticForgeArchive</code> to load assets by path</li></ol>
<hr>
<blockquote><strong>Tip:</strong> <code>.sfpak</code> files are binary and not meant to be edited manually. Always rebuild them from source assets using the tool.</blockquote></div>
  </section>

<template id="tmpl-node_mpha8gjjk87fha1e4x5rz">
  <div class="main" data-node-id="node_mpha8gjjk87fha1e4x5rz" data-tab-id="tab_mpha8gjjjq8yii1k0vlqo">
    <section id="node_mpha8gjjk87fha1e4x5rz" class="export-section">
    
    <div class="export-section__body"><h1>Packing Assets</h1>
<p>Use <code>StaticForgeTool</code> to pack a folder of assets into a <code>.sfpak</code> archive.</p>
<h2>Basic usage</h2>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./assets --output ./build</code></pre><div class="code-language-tag">bash</div></div>
<p>This scans <code>./assets</code> recursively and writes the archive to <code>./build/main.sfpak</code>.</p>
<h2>Specifying an archive name</h2>
<p>By default the archive is named <code>main</code>. Use <code>--name</code> to override:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./assets --output ./build --name textures</code></pre><div class="code-language-tag">bash</div></div>
<p>This produces <code>./build/textures.sfpak</code>.</p>
<h2>Multiple source folders</h2>
<p><code>--source</code> can be repeated to include multiple directories:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./textures --source ./audio --output ./build</code></pre><div class="code-language-tag">bash</div></div>
or
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source &quot;./textures, ./audio&quot; --output ./build</code></pre><div class="code-language-tag">bash</div></div>
<h2>Creating the output directory automatically</h2>
<p>If the output directory doesn't exist yet, add <code>--mkdir</code>:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./assets --output ./build/packed --mkdir true</code></pre><div class="code-language-tag">bash</div></div>
<h2>Verbose output</h2>
<p>Add <code>--verbose</code> (or <code>-v</code>) to print detailed information about every file processed:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./assets --output ./build --verbose</code></pre><div class="code-language-tag">bash</div></div></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjjbh07gwib462h">

    <div class="export-section__body"><h1>Meta Files</h1>
<p>Meta files let you split assets from a single source tree into multiple <code>.sfpak</code> archives automatically.</p>
<h2>File format</h2>
<p>A meta file has the extension <code>.sfpak.meta</code> and uses a simple semicolon-terminated key-value syntax:</p>
<div class="code-block-wrapper"><pre><code>archive = textures;
exclude = .png, .jpg;
storenames = true;</code></pre></div>
<p>Each statement is a <code>key = value;</code> pair. Whitespace around <code>=</code> and <code>;</code> is ignored.</p>
<p>Comments start with <code>#</code> and run to the end of the line:</p>
<div class="code-block-wrapper"><pre><code># pack all UI assets together
archive = ui;
exclude = .psd; # skip source files</code></pre></div>
<h2>Supported parameters</h2>
<table><thead><tr><th>Key</th><th>Type</th><th>Required</th><th>Description</th></tr></thead><tbody><tr><td><code>archive</code></td><td>string</td><td>yes</td><td>Name for the <code>.sfpak</code> archive produced from this directory</td></tr><tr><td><code>exclude</code></td><td>string[]</td><td>no</td><td>Comma-separated list of file extensions to skip (e.g. <code>.png</code>)</td></tr><tr><td><code>storenames</code></td><td>bool</td><td>no</td><td>Store original filenames in the archive for debug inspection</td></tr></tbody></table>
Example with all parameters:
<div class="code-block-wrapper"><pre><code>archive = main;
exclude = .png, .jpg, .vert, .help;
storenames = true;</code></pre></div>
<h2>How it works</h2>
<p>When the tool scans your source directories it looks for <code>.sfpak.meta</code> files. Every asset file in the same directory (or any subdirectory) is then packed into the archive named in that meta file. Excluded extensions are skipped entirely.</p>
<div class="code-block-wrapper"><pre><code>assets/
  textures/
    textures.sfpak.meta   &lt;- archive = textures; exclude = .psd;
    background.png
    ui.png
  audio/
    audio.sfpak.meta      &lt;- archive = audio;
    music.ogg
    sfx.wav
  scripts/
    game.lua              &lt;- no meta file → goes into the default archive</code></pre></div>
<p>Running the tool on <code>assets/</code> produces:<br><ul><li><code>textures.sfpak</code></li><li><code>audio.sfpak</code></li><li><code>main.sfpak</code> (for everything without a meta file)</li></ul></p>
<h2>Fallback</h2>
<p>Files that are not covered by any meta file are packed into the archive name set with <code>--name</code> (default: <code>main</code>).</p>
<h2>storenames override</h2>
<p>If <code>--storenames</code> is passed on the command line, name storage is enabled globally for <strong>all</strong> archives — even those whose meta file sets <code>storenames = false</code>. The meta value only takes effect when the CLI flag is not set.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjjbujkkm1c1k73n">
  <div class="main" data-node-id="node_mpha8gjjbujkkm1c1k73n" data-tab-id="tab_mpha8gjjjq8yii1k0vlqo">
    <section id="node_mpha8gjjbujkkm1c1k73n" class="export-section">
    
    <div class="export-section__body"><h1>Inspecting Archives</h1>
<p>Use <code>--info</code> to display header and index information of one or more existing <code>.sfpak</code> files without extracting anything.</p>
<h2>Basic info</h2>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --info ./build/textures.sfpak</code></pre><div class="code-language-tag">bash</div></div>
<p>Output:</p>
<div class="code-block-wrapper"><pre><code>Archive: textures.sfpak
Version: 1
File count: 42
Index offset: 32
Index size: 1176
Data offset: 4096</code></pre></div>
<h2>Inspecting multiple archives at once</h2>
<p><code>--info</code> can be repeated to inspect several archives in one invocation:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --info ./build/textures.sfpak --info ./build/audio.sfpak</code></pre><div class="code-language-tag">bash</div></div>
<p>Each archive is printed in sequence with a separator between them.</p>
<h2>Verbose index listing</h2>
<p>Add <code>--verbose</code> to also print every index entry:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --info ./build/textures.sfpak --verbose</code></pre><div class="code-language-tag">bash</div></div>
<p>Output includes a line per file showing its hash, byte offset, size, and checksum:</p>
<div class="code-block-wrapper"><pre><code>Index entries:
  [0] hash: 12938471234  offset: 4096    size: 204800  checksum: 3421543
  [1] hash: 98712634521  offset: 208896  size: 81920   checksum: 9871234
  ...</code></pre></div>
<h2>Name table</h2>
<p>If the archive was built with <code>--storenames</code> (or <code>storenames = true</code> in the meta file), the inspector also prints the name table, showing the original relative path for each entry.</p>
<blockquote><strong>Note:</strong> Without name storage the index only contains hashes. The original path is not recoverable from the archive alone — keep your source assets.</blockquote></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjjd4bwaskquzs">
  <div class="main" data-node-id="node_mpha8gjjd4bwaskquzs" data-tab-id="tab_mpha8gjjjq8yii1k0vlqo">
    <section id="node_mpha8gjjd4bwaskquzs" class="export-section">
    
    <div class="export-section__body"><h1>Loading Assets at Runtime</h1>
<p>At runtime, use <code>StaticForgeReader</code> to open a <code>.sfpak</code> file and <code>StaticForgeArchive</code> to load individual assets.</p>
<h2>Opening an archive</h2>
<div class="code-block-wrapper"><pre><code>#include &lt;StaticForgeCore/StaticForge.h&gt;

StaticForge::StaticForgeArchive archive;
StaticForge::StaticForgeReader reader;

if (!reader.Load(&quot;./build/textures.sfpak&quot;, &amp;archive)) {
    // reader.GetError() contains a description of what went wrong
    std::cerr &lt;&lt; reader.GetError() &lt;&lt; std::endl;
}</code></pre><div class="code-language-tag">cpp</div></div>
<h2>Loading a file by path</h2>
<p>Pass the <strong>relative path</strong> of the file exactly as it appeared under the source directory:</p>
<div class="code-block-wrapper"><pre><code>std::vector&lt;std::byte&gt; data;
if (!archive.LoadAsset(&quot;textures/background.png&quot;, data)) {
    std::cerr &lt;&lt; archive.GetError() &lt;&lt; std::endl;
}
// data now contains the raw bytes of the file</code></pre><div class="code-language-tag">cpp</div></div>
<blockquote><strong>Important:</strong> The asset path must exactly match the path relative to the source root. Slashes are normalized internally, but typos or case mismatches will prevent the asset from being found.</blockquote>
<h2>Managing the file stream</h2>
<p>After <code>StaticForgeReader::Load</code> succeeds the archive's file stream is open. <code>LoadAsset</code> reopens it automatically if it was closed. You can control this manually:</p>
<div class="code-block-wrapper"><pre><code>archive.CloseFileStream(); // release the file handle
archive.OpenFileStream();  // reopen when needed
bool open = archive.IsFileStreamOpen();</code></pre><div class="code-language-tag">cpp</div></div>
<h2>Error handling</h2>
<p>Both <code>StaticForgeReader</code> and <code>StaticForgeArchive</code> support error messages. Always check the return value of <code>Load</code> and <code>LoadAsset</code> and read <code>GetError()</code> when they return <code>false</code>.</p>
<div class="code-block-wrapper"><pre><code>if (!archive.LoadAsset(&quot;audio/music.ogg&quot;, data)) {
    // possible reasons: key not found, seek failure, checksum mismatch
    std::cerr &lt;&lt; archive.GetError() &lt;&lt; std::endl;
}</code></pre><div class="code-language-tag">cpp</div></div></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjjs3dwv4197l6gm">
  <div class="main" data-node-id="node_mpha8gjjs3dwv4197l6gm" data-tab-id="tab_mpha8gjjjq8yii1k0vlqo">
    <section id="node_mpha8gjjs3dwv4197l6gm" class="export-section">
    
    <div class="export-section__body"><h1>Building Archives in Code</h1>
<p>Instead of using the command-line tool you can drive the build process directly from C++ using <code>StaticForgeBuilder</code>.</p>
<h2>Minimal example</h2>
<div class="code-block-wrapper"><pre><code>#include &lt;StaticForgeCore/StaticForge.h&gt;

StaticForge::StaticForgeBuilder builder;
builder
    .SetArchiveName(&quot;textures&quot;)
    .AddSourcePath(&quot;./assets/textures&quot;)
    .SetOutputPath(&quot;./build&quot;)
    .SetCreateOutputDir(true);

if (!builder.Build()) {
    std::cerr &lt;&lt; builder.GetError() &lt;&lt; std::endl;
}</code></pre><div class="code-language-tag">cpp</div></div>
<h2>Multiple source paths</h2>
<div class="code-block-wrapper"><pre><code>builder.SetSourcePath({
    &quot;./assets/textures&quot;,
    &quot;./assets/audio&quot;
});</code></pre><div class="code-language-tag">cpp</div></div>
<p>or add them one at a time:</p>
<div class="code-block-wrapper"><pre><code>builder.AddSourcePath(&quot;./assets/textures&quot;);
builder.AddSourcePath(&quot;./assets/audio&quot;);</code></pre><div class="code-language-tag">cpp</div></div>
<h2>Fluent API</h2>
<p>All setters return <code>*this</code> so they can be chained:</p>
<div class="code-block-wrapper"><pre><code>StaticForge::StaticForgeBuilder builder{ &quot;main&quot;, { &quot;./assets&quot; }, &quot;./build&quot; };
builder
    .SetCreateOutputDir(true)
    .SetDebugMode(true)
    .Build();</code></pre><div class="code-language-tag">cpp</div></div>
<h2>Debug mode</h2>
<p><code>SetDebugMode(true)</code> prints detailed progress to <code>stdout</code> - the same output as <code>--verbose</code> in the CLI tool.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjjzfh33k1daxwi7">
  <div class="main" data-node-id="node_mpha8gjjzfh33k1daxwi7" data-tab-id="tab_mpha8gjjjq8yii1k0vlqo">
    <section id="node_mpha8gjjzfh33k1daxwi7" class="export-section">
    
    <div class="export-section__body"><h1>CLI Reference</h1>
<p>Quick reference for all <code>StaticForgeTool</code> arguments.</p>
<h2>Arguments</h2>
<table><thead><tr><th>Argument</th><th>Short</th><th>Description</th><th>Type</th><th>Default</th><th>Multi</th></tr></thead><tbody><tr><td><code>--source</code></td><td><code>--src</code></td><td>Source path(s) of the files to be packed (can be specified multiple times)</td><td>filepath</td><td>—</td><td>yes</td></tr><tr><td><code>--output</code></td><td><code>--o</code></td><td>Output directory for the <code>.sfpak</code> file</td><td>filepath</td><td>—</td><td>no</td></tr><tr><td><code>--name</code></td><td><code>--n</code></td><td>Default archive name when no <code>.sfpak.meta</code> file is found</td><td>string</td><td><code>main</code></td><td>no</td></tr><tr><td><code>--mkdir</code></td><td><code>--p</code></td><td>Create the output directory if it does not exist</td><td>bool</td><td>false</td><td>no</td></tr><tr><td><code>--info</code></td><td><code>--i</code></td><td>Display header and index info of a <code>.sfpak</code> file (can be repeated)</td><td>filepath</td><td>—</td><td>yes</td></tr><tr><td><code>--verbose</code></td><td><code>--v</code></td><td>Enable debug/verbose console output</td><td>bool</td><td>false</td><td>no</td></tr><tr><td><code>--store-names</code></td><td><code>--sn</code></td><td>Store original filenames in all archives for debug inspection</td><td>bool</td><td>false</td><td>no</td></tr><tr><td><code>--help</code></td><td><code>--h</code></td><td>Show this help message</td><td>—</td><td>—</td><td>no</td></tr></tbody></table>
<h2>Modes</h2>
<p>Exactly one mode must be active per invocation. Modes are determined by which arguments are provided:</p>
<table><thead><tr><th>Mode</th><th>Required arguments</th></tr></thead><tbody><tr><td>pack</td><td><code>--source</code> and <code>--output</code></td></tr><tr><td>info</td><td><code>--info</code></td></tr><tr><td>help</td><td><code>--help</code></td></tr></tbody></table>
Combining arguments from multiple modes (e.g. <code>--source</code> together with <code>--info</code>) is an error.
<h2>storenames priority</h2>
<p>When <code>--store-names</code> is set on the command line, <br>name storage is forced on for every archive regardless of what the <code>.sfpak.meta</code> file specifies. <br>The meta-file value of <code>store-names</code> is only used when the CLI flag is absent.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjj1jsm0i3jt2wiv">
  <div class="main" data-node-id="node_mpha8gjj1jsm0i3jt2wiv" data-tab-id="tab_mpha8gjj1ei9td1494o8n">
    <section id="node_mpha8gjj1jsm0i3jt2wiv" class="export-section">
    
    <div class="export-section__body"><h1>Architecture</h1>
<p>StaticForge is split into two main components.</p>
<h2>StaticForgeCore</h2>
<p>The core static library. Contains all format logic and is linked by both the tool and any consuming application:</p>
<ul><li>Archive format definition and binary layout</li><li><code>StaticForgeBuilder</code> - writes <code>.sfpak</code> files</li><li><code>StaticForgeReader</code> - reads and validates <code>.sfpak</code> files</li><li><code>StaticForgeArchive</code> - runtime handle for an open archive</li><li>Meta file parsing (<code>StaticForgeMeta</code>)</li><li>Internal helpers: hashing, alignment, endian handling, error support</li></ul>
<h2>StaticForgeTool</h2>
<p>The CLI executable. Wraps <code>StaticForgeCore</code> with argument parsing and three modes: pack, info, help. Does not contain any format logic itself.</p>
<h2>Dependency graph</h2>
<div class="code-block-wrapper"><pre><code>StaticForgeTool
    └── StaticForgeCore
            ├── StaticForgeBuilder
            ├── StaticForgeReader
            ├── StaticForgeArchive
            └── Internal (helpers, meta, hashing)

Your Game / Application
    └── StaticForgeCore
            ├── StaticForgeReader
            └── StaticForgeArchive</code></pre></div>
<p>The tool-side classes (<code>StaticForgeBuilder</code>, meta parsing) are compiled into Core but an application that only reads archives still links the same library - there is currently no separate runtime-only build target.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjjphchud1l6j2py">
  <div class="main" data-node-id="node_mpha8gjjphchud1l6j2py" data-tab-id="tab_mpha8gjj1ei9td1494o8n">
    <section id="node_mpha8gjjphchud1l6j2py" class="export-section">
    
    <div class="export-section__body"><h1>File Format</h1>
<p>A <code>.sfpak</code> file consists of three required regions and two optional regions written sequentially: <strong>Header</strong>, <strong>Index</strong>, <strong>Data</strong>, and — when name storage is enabled — <strong>Name Table Header</strong>, <strong>Name Table Entries</strong>, and <strong>Name Table String Data</strong>.</p>
<h2>Layout</h2>
<div class="code-block-wrapper"><pre><code>[ HEADER                 ]  aligned to ALIGNMENT_HEADER = 32 bytes
[ INDEX                  ]  N × sizeof(IndexEntry), then padded to ALIGNMENT_FILE = 4096
[ DATA BLOCKS            ]  files written back-to-back, each padded to ALIGNMENT_FILE = 4096
[ NAME TABLE HEADER      ]  optional — present when storenames is enabled
[ NAME TABLE ENTRIES     ]  optional — one entry per file
[ NAME TABLE STRING DATA ]  optional — raw UTF-8 path strings packed together</code></pre></div>
<h2>Header</h2>
<p>Magic bytes <code>SFPK</code> followed by six <code>uint64_t</code> fields. Written little-endian on all platforms.</p>
<table><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead><tbody><tr><td><code>magic</code></td><td><code>char[4]</code></td><td>Always <code>S</code>, <code>F</code>, <code>P</code>, <code>K</code></td></tr><tr><td><code>version</code></td><td><code>uint64_t</code></td><td>Format version (currently <code>1</code>)</td></tr><tr><td><code>fileCount</code></td><td><code>uint64_t</code></td><td>Number of files in this archive</td></tr><tr><td><code>indexOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the start of the index</td></tr><tr><td><code>indexSize</code></td><td><code>uint64_t</code></td><td>Total size of the index in bytes</td></tr><tr><td><code>dataOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the start of data</td></tr><tr><td><code>nameTableHeaderOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the Name Table Header, or <code>0</code> if not present</td></tr></tbody></table>
<h2>Index entry</h2>
<p>One entry per file, stored contiguously starting at <code>indexOffset</code>.</p>
<table><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead><tbody><tr><td><code>hashName</code></td><td><code>uint64_t</code></td><td>FNV-1a hash of the relative file path</td></tr><tr><td><code>fileOffset</code></td><td><code>uint64_t</code></td><td>Byte offset of the file's data block</td></tr><tr><td><code>fileSize</code></td><td><code>uint64_t</code></td><td>Original (unpadded) file size in bytes</td></tr><tr><td><code>filePadding</code></td><td><code>uint32_t</code></td><td>Padding bytes appended after the file data</td></tr><tr><td><code>checksum</code></td><td><code>uint32_t</code></td><td>FNV-1a checksum of the file data (integrity check)</td></tr></tbody></table>
<h2>Name Table Header</h2>
<p>Present only when the archive was built with name storage enabled. Located at <code>nameTableHeaderOffset</code>.</p>
<table><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead><tbody><tr><td><code>entryOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the first Name Table Entry</td></tr><tr><td><code>stringDataOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the start of Name Table String Data</td></tr><tr><td><code>stringDataSize</code></td><td><code>uint64_t</code></td><td>Total size of the string data region in bytes</td></tr></tbody></table>
<h2>Name Table Entry</h2>
<p>One entry per file, stored contiguously starting at <code>entryOffset</code>.</p>
<table><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead><tbody><tr><td><code>hash</code></td><td><code>uint64_t</code></td><td>FNV-1a hash of the path (matches <code>hashName</code> in the corresponding index entry)</td></tr><tr><td><code>nameLength</code></td><td><code>uint32_t</code></td><td>Length of the UTF-8 path string in bytes</td></tr><tr><td><code>nameOffset</code></td><td><code>uint64_t</code></td><td>Byte offset within the String Data region where this path starts</td></tr></tbody></table>
<h2>Name Table String Data</h2>
<p>Raw UTF-8 path strings packed end-to-end with no separators. To read a filename, seek to <code>stringDataOffset + nameOffset</code> and read <code>nameLength</code> bytes.</p>
<h2>Alignment</h2>
<ul><li>The header region is padded to 32 bytes (<code>ALIGNMENT_HEADER</code>).</li><li>Every file data block is padded to 4096 bytes (<code>ALIGNMENT_FILE</code>) — one filesystem page.</li><li>Padding bytes are always zero.</li></ul>
<p>This alignment ensures that file offsets are always multiples of 4096, which allows direct memory-mapped access without additional alignment work.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjji36qgy1pa2q8b">
  <div class="main" data-node-id="node_mpha8gjji36qgy1pa2q8b" data-tab-id="tab_mpha8gjj1ei9td1494o8n">
    <section id="node_mpha8gjji36qgy1pa2q8b" class="export-section">
    
    <div class="export-section__body"><h1>Hashing</h1>
<p>StaticForge uses <strong>FNV-1a</strong> (Fowler–Noll–Vo) for two purposes: filename lookup and data integrity.</p>
<h2>Filename hashing</h2>
<p>When the builder packs a file, the relative path string (e.g. <code>textures/background.png</code>) is hashed to a <code>uint64_t</code> and stored in the index as <code>hashName</code>.</p>
<p>At runtime, <code>StaticForgeArchive::LoadAsset</code> hashes the key string you pass in and looks it up in the index map. The original string is never stored in the archive.</p>
<p><strong>Implications:</strong><br><ul><li>Lookups are O(1) via <code>std::unordered_map</code>.</li><li>The archive cannot list filenames - only validate whether a known key exists.</li><li>Hash collisions between two different paths in the same archive are detected at build time and cause an error.</li></ul></p>
<h2>Data checksum</h2>
<p>During packing, each file's raw bytes are fed through FNV-1a with the initial value <code>2166136261</code> to produce a <code>uint32_t</code> checksum. This is written back into the index entry after the data is flushed.</p>
<p>When loading, <code>StaticForgeArchive::LoadEntry</code> recomputes the checksum over the read bytes and compares it to the stored value. A mismatch causes <code>LoadAsset</code> to return <code>false</code> with an error message.</p>
<h2>Path format</h2>
<p>Use a path <strong>relative to the source root</strong> used during packing.</p>
<div class="code-block-wrapper"><pre><code>// Correct
archive.LoadAsset(&quot;textures/background.png&quot;, data);

// Also valid
archive.LoadAsset(&quot;textures\\background.png&quot;, data);

// Wrong - path is not relative to the source root
archive.LoadAsset(&quot;./assets/textures/background.png&quot;, data);</code></pre><div class="code-language-tag">cpp</div></div></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjj1lxmq1t1yijun1">
  <div class="main" data-node-id="node_mpha8gjj1lxmq1t1yijun1" data-tab-id="tab_mpha8gjj1ei9td1494o8n">
    <section id="node_mpha8gjj1lxmq1t1yijun1" class="export-section">
    
    <div class="export-section__body"><h1>Build Process</h1>
<p><code>StaticForgeBuilder::Build()</code> runs three internal phases in sequence.</p>
<h2>1. CheckFilepaths</h2>
<p>Validates that all source paths exist and that the output path is a directory (no file extension). If <code>SetCreateOutputDir(true)</code> was called and the directory is missing, it is created here.</p>
<h2>2. ScanFiles</h2>
<p>Recursively iterates every source path in two passes:</p>
<p><strong>Pass 1 — Meta collection:</strong>  <br>Collects all <code>.sfpak.meta</code> files and builds a <code>directory → ArchiveMeta</code> mapping. Each entry stores the archive name, excluded extensions, and the <code>storenames</code> flag.</p>
<p><strong>Pass 2 — File assignment:</strong>  <br>Iterates all non-meta files, computes their relative path, hashes it with FNV-1a, and assigns each file to the appropriate <code>ArchiveGroup</code> by walking up the directory tree until a meta entry is found. Falls back to the default archive name if no meta file applies.</p>
<p>For each file the builder also:<br><ul><li>Detects hash collisions between files in the same group and reports them as errors.</li><li>Computes the aligned file size and stores the padding needed to reach the next 4096-byte boundary.</li><li>Applies the <code>storenames</code> override: if the global CLI flag is set, name storage is forced on even when the meta file sets <code>storenames = false</code>.</li></ul></p>
<h2>3. BuildGroups</h2>
<p>For each <code>ArchiveGroup</code>, three sub-phases run in order:</p>
<p><strong>BuildIndex</strong> — computes the byte offset of every file data block. Starts after the aligned header + index region (<code>dataStart</code>) and accumulates offsets by adding each file's aligned size.</p>
<p><strong>BuildNameTable</strong> <em>(optional, when storenames is enabled)</em> — computes the byte layout of the Name Table Header, Name Table Entries, and String Data region. Offsets are appended after the last data block.</p>
<p><strong>WriteFile</strong> — opens the output stream and calls the write phases below.</p>
<h2>Write phases</h2>
<table><thead><tr><th>Phase</th><th>What it writes</th></tr></thead><tbody><tr><td><code>WriteHeader</code></td><td>The <code>StaticForgeHeader</code> struct padded to 32 bytes</td></tr><tr><td><code>WriteIndex</code></td><td>One <code>StaticForgeIndexEntry</code> per file; checksum field written as <code>0</code> initially</td></tr><tr><td><code>WriteData</code></td><td>File bytes in 4096-byte blocks; after each file the checksum is computed and written back into the index via <code>seekp</code></td></tr><tr><td><code>WriteNameTable</code></td><td><em>(optional)</em> Name Table Header, then Name Table Entries, then raw UTF-8 string data</td></tr></tbody></table>
Checksums are written back in place after the data pass so that the index and data can be written in a single forward pass over the output file with only a brief <code>seekp</code> back per file.
<h2>Overflow safety</h2>
<p>All size and offset arithmetic uses checked helpers that return <code>false</code> on overflow instead of wrapping silently:</p>
<table><thead><tr><th>Helper</th><th>Description</th></tr></thead><tbody><tr><td><code>SafeAddU64</code></td><td>Addition with overflow check</td></tr><tr><td><code>SafeMulU64</code></td><td>Multiplication with overflow check</td></tr><tr><td><code>SafeAlignSize</code></td><td>Rounds up to a power-of-two alignment, overflow-safe</td></tr><tr><td><code>GetHeaderSize</code></td><td>Returns the aligned header size via <code>SafeAlignSize</code></td></tr></tbody></table>
Any overflow causes <code>Build()</code> to return <code>false</code> with a descriptive error.</div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjjcqfpetgsvgfz">
  <div class="main" data-node-id="node_mpha8gjjcqfpetgsvgfz" data-tab-id="tab_mpha8gjj1ei9td1494o8n">
    <section id="node_mpha8gjjcqfpetgsvgfz" class="export-section">
    
    <div class="export-section__body"><h1>Meta File Parser</h1>
<p>Meta files use a minimal custom format parsed by <code>StaticForgeMeta</code> inside <code>StaticForgeCore</code>.</p>
<h2>Syntax</h2>
<p>Each statement is a key-value pair terminated by a semicolon:</p>
<div class="code-block-wrapper"><pre><code>key = value;</code></pre></div>
<p>Multiple statements can appear in any order:</p>
<div class="code-block-wrapper"><pre><code>archive = main;
exclude = .png, .jpg, .vert, .help;
storenames = true;</code></pre></div>
<p>Comments start with <code>#</code> and run to the end of the line:</p>
<div class="code-block-wrapper"><pre><code># this is a comment
archive = main;</code></pre></div>
<h2>Tokenizer</h2>
<p><code>MetaTokenizer</code> reads the entire file into memory, then walks it character by character via <code>ProcessContent</code> → <code>ProcessChar</code>. It tracks the current line and column for error reporting and produces a flat <code>std::vector&lt;MetaToken&gt;</code>.</p>
<p><strong>Character dispatch (<code>ProcessChar</code>):</strong></p>
<table><thead><tr><th>Input</th><th>Action</th></tr></thead><tbody><tr><td>Whitespace (<code>\r</code>, <code>\n</code>, <code> </code>, <code>\t</code>)</td><td>Skipped; newlines increment the line counter</td></tr><tr><td><code>=</code></td><td>Emit <code>Assign</code></td></tr><tr><td><code>,</code></td><td>Emit <code>Separator</code></td></tr><tr><td><code>;</code></td><td>Emit <code>Delimiter</code></td></tr><tr><td><code>#</code></td><td>Call <code>SkipComment</code> — consume until <code>\n</code></td></tr><tr><td>Alpha, <code>_</code>, <code>.</code>, <code>-</code></td><td>Call <code>ReadIdentifier</code></td></tr><tr><td>Anything else</td><td>Add error, emit <code>UNKNOWN</code></td></tr></tbody></table>
<strong><code>ReadIdentifier</code>:</strong> records the start pointer, then advances <code>m_cur</code> while the character is alphanumeric, <code>_</code>, <code>.</code>, or <code>-</code>. The resulting <code>string_view</code> into the in-memory buffer is stored in the token without any heap allocation.
<p><strong>Token types:</strong></p>
<table><thead><tr><th>Token type</th><th>Description</th></tr></thead><tbody><tr><td><code>Identifier</code></td><td>An unquoted word — keys, values, extensions, booleans</td></tr><tr><td><code>Assign</code></td><td>The <code>=</code> character</td></tr><tr><td><code>Separator</code></td><td>The <code>,</code> character (used between list values like extensions)</td></tr><tr><td><code>Delimiter</code></td><td>The <code>;</code> character — terminates a statement</td></tr><tr><td><code>EndOfFile</code></td><td>Sentinel appended after the last character</td></tr><tr><td><code>UNKNOWN</code></td><td>Unrecognised character; always accompanied by an error</td></tr></tbody></table>
Every token stores its <strong>line</strong> and <strong>column</strong> at the point it was emitted.
<h2>Parser</h2>
<p><code>StaticForgeMeta::ParseTokens</code> consumes the token stream produced by <code>MetaTokenizer</code>. Each statement follows this pattern:</p>
<div class="code-block-wrapper"><pre><code>Identifier(key)  Assign  Identifier(value)  Delimiter</code></pre></div>
<p>For list values (e.g. <code>exclude</code>) the value section is instead:</p>
<div class="code-block-wrapper"><pre><code>Identifier  Separator  Identifier  Separator  ...  Identifier  Delimiter</code></pre></div>
<p>Any deviation — wrong token type, unexpected <code>EndOfFile</code>, missing <code>Delimiter</code> — is a parse error that includes the line and column of the offending token.</p>
<h2>Error suggestions</h2>
<p>If an <code>Identifier</code> key is not recognised, the parser computes the edit distance to every known key. If the closest match differs by at most 3 characters a suggestion is appended to the error:</p>
<div class="code-block-wrapper"><pre><code>Unknown key &#39;archiv&#39; at line 1, column 1. Did you mean &#39;archive&#39;?</code></pre></div>
<h2>Supported parameters</h2>
<table><thead><tr><th>Key</th><th>Type</th><th>Required</th><th>Description</th></tr></thead><tbody><tr><td><code>archive</code></td><td>string</td><td>yes</td><td>Name for the <code>.sfpak</code> archive</td></tr><tr><td><code>exclude</code></td><td>string[]</td><td>no</td><td>Comma-separated list of file extensions to skip</td></tr><tr><td><code>storenames</code></td><td>bool</td><td>no</td><td>Store original filenames in the archive for debug inspection</td></tr></tbody></table>
<h2>Value parsing</h2>
<p><strong><code>archive</code></strong> — the <code>Identifier</code> token value is used as-is.</p>
<p><strong><code>exclude</code></strong> — after the <code>=</code>, the parser collects <code>Identifier</code> tokens separated by <code>Separator</code> (<code>,</code>) tokens until it sees a <code>Delimiter</code> (<code>;</code>). Each token value is trimmed and lowercased, so <code>.PNG</code> and <code>.png</code> are treated identically.</p>
<p><strong><code>storenames</code></strong> — the single <code>Identifier</code> token after <code>=</code> is compared case-insensitively. <code>true</code> and <code>1</code> are truthy; anything else is false.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjjp7r1vg1mnf2n8">
  <div class="main" data-node-id="node_mpha8gjjp7r1vg1mnf2n8" data-tab-id="tab_mpha8gjj1ei9td1494o8n">
    <section id="node_mpha8gjjp7r1vg1mnf2n8" class="export-section">
    
    <div class="export-section__body"><h1>StaticForgeArchive</h1>
<p><code>StaticForgeArchive</code> is the runtime handle for a loaded <code>.sfpak</code> file. It is populated by <code>StaticForgeReader::Load</code> and then used to retrieve asset data.</p>
<h2>Ownership and move semantics</h2>
<p><code>StaticForgeArchive</code> is move-only. Copying is deleted because it owns an open <code>std::ifstream</code>.</p>
<div class="code-block-wrapper"><pre><code>StaticForge::StaticForgeArchive a;
StaticForge::StaticForgeArchive b = std::move(a); // OK
StaticForge::StaticForgeArchive c = a;            // compile error</code></pre><div class="code-language-tag">cpp</div></div>
<h2>Internal state</h2>
<table><thead><tr><th>Member</th><th>Description</th></tr></thead><tbody><tr><td><code>m_path</code></td><td>Path to the <code>.sfpak</code> file on disk</td></tr><tr><td><code>m_stream</code></td><td><code>std::ifstream</code> used for all reads</td></tr><tr><td><code>m_header</code></td><td>Parsed <code>StaticForgeHeader</code> struct</td></tr><tr><td><code>m_indexEntries</code></td><td><code>std::vector&lt;StaticForgeIndexEntry&gt;</code> — one per file</td></tr><tr><td><code>m_hashNameToEntry</code></td><td><code>std::unordered_map&lt;uint64_t, size_t&gt;</code> for O(1) lookup</td></tr></tbody></table>
<h2>LoadAsset flow</h2>
<ol><li>Hash the key string with <code>HashFilename</code>.</li><li>Look up the hash in <code>m_hashNameToEntry</code> to find the index position.</li><li>Call <code>LoadEntry</code> which seeks to <code>fileOffset</code>, reads <code>fileSize</code> bytes, and validates the FNV-1a checksum.</li><li>Return the raw bytes in <code>outData</code>.</li></ol>
<h2>Accessor methods</h2>
<p>All getters read directly from <code>m_header</code> or <code>m_indexEntries</code> and are cheap:</p>
<div class="code-block-wrapper"><pre><code>archive.GetVersion();                // uint64_t
archive.GetFileCount();              // size_t
archive.GetIndexOffset();            // uint64_t
archive.GetIndexSize();              // uint64_t
archive.GetDataOffset();             // uint64_t
archive.GetNameTableHeaderOffset();  // uint64_t — 0 if no name table present

archive.GetHashName(i);              // uint64_t
archive.GetFileOffset(i);            // uint64_t
archive.GetFileSize(i);              // uint64_t
archive.GetFilePadding(i);           // uint64_t</code></pre><div class="code-language-tag">cpp</div></div>
<h2>Managing the file stream</h2>
<p>After <code>StaticForgeReader::Load</code> succeeds the archive's file stream is open. <code>LoadAsset</code> reopens it automatically if it was closed. You can control this manually:</p>
<div class="code-block-wrapper"><pre><code>archive.CloseFileStream(); // release the file handle
archive.OpenFileStream();  // reopen when needed
bool open = archive.IsFileStreamOpen();</code></pre><div class="code-language-tag">cpp</div></div>
<h2>Error handling</h2>
<p>Both <code>StaticForgeReader</code> and <code>StaticForgeArchive</code> support error messages. Always check the return value of <code>Load</code> and <code>LoadAsset</code> and read <code>GetError()</code> when they return <code>false</code>.</p>
<div class="code-block-wrapper"><pre><code>if (!archive.LoadAsset(&quot;audio/music.ogg&quot;, data)) {
    // possible reasons: key not found, seek failure, checksum mismatch
    std::cerr &lt;&lt; archive.GetError() &lt;&lt; std::endl;
}</code></pre><div class="code-language-tag">cpp</div></div></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mpha8gjj1hdm70lce6vhl">
  <div class="main" data-node-id="node_mpha8gjj1hdm70lce6vhl" data-tab-id="tab_mpha8gjj1ei9td1494o8n">
    <section id="node_mpha8gjj1hdm70lce6vhl" class="export-section">
    
    <div class="export-section__body"><h1>ErrorSupport</h1>
<p><code>ErrorSupport</code> is the base class for <code>StaticForgeBuilder</code>, <code>StaticForgeReader</code>, and <code>StaticForgeArchive</code>.  <br>It provides a simple error collection system with optional formatted prefixes.</p>
<h2>API</h2>
<div class="code-block-wrapper"><pre><code>bool IsValid() const;    // true if no errors were added
std::string GetError();  // returns all collected errors as a single string</code></pre><div class="code-language-tag">cpp</div></div>
<h2>Header mode</h2>
<p>The constructor takes a boolean <code>hasHeader</code>.</p>
<p>When enabled, the first error is prefixed with:</p>
<div class="code-block-wrapper"><pre><code>[Error]:</code></pre><div class="code-language-tag">txt</div></div>
<p>Additional errors are indented for readability.</p>
<p>Example:</p>
<div class="code-block-wrapper"><pre><code>[Error]: Failed to load archive
&gt;        Failed to read header
&gt;        Invalid magic value</code></pre><div class="code-language-tag">txt</div></div>
<p><code>HAS_HEADER</code> is a constant with the value <code>true</code> and is used by:</p>
<ul><li><code>StaticForgeBuilder</code></li><li><code>StaticForgeReader</code></li><li><code>StaticForgeArchive</code></li></ul>
<p>Internal helper classes such as <code>StaticForgeMeta</code> usually disable this mode and emit raw messages without formatting.</p>
<h2>Error accumulation</h2>
<p>Errors are accumulated in insertion order.</p>
<p>Each call to <code>AddError()</code> appends a new entry to the internal error list.  <br><code>GetError()</code> combines all stored messages into a single newline-separated string.</p></div>
  </section>
  </div>
</template>

  // -- Data ----------------------------------------------------------------
  var allNodes = [{"id":"node_mpha8gjj5lppy7p7pxpi","tabId":"tab_mpha8gjjjq8yii1k0vlqo"},{"id":"node_mpha8gjjk87fha1e4x5rz","tabId":"tab_mpha8gjjjq8yii1k0vlqo"},{"id":"node_mpha8gjjbh07gwib462h","tabId":"tab_mpha8gjjjq8yii1k0vlqo"},{"id":"node_mpha8gjjbujkkm1c1k73n","tabId":"tab_mpha8gjjjq8yii1k0vlqo"},{"id":"node_mpha8gjjd4bwaskquzs","tabId":"tab_mpha8gjjjq8yii1k0vlqo"},{"id":"node_mpha8gjjs3dwv4197l6gm","tabId":"tab_mpha8gjjjq8yii1k0vlqo"},{"id":"node_mpha8gjjzfh33k1daxwi7","tabId":"tab_mpha8gjjjq8yii1k0vlqo"},{"id":"node_mpha8gjj1jsm0i3jt2wiv","tabId":"tab_mpha8gjj1ei9td1494o8n"},{"id":"node_mpha8gjjphchud1l6j2py","tabId":"tab_mpha8gjj1ei9td1494o8n"},{"id":"node_mpha8gjji36qgy1pa2q8b","tabId":"tab_mpha8gjj1ei9td1494o8n"},{"id":"node_mpha8gjj1lxmq1t1yijun1","tabId":"tab_mpha8gjj1ei9td1494o8n"},{"id":"node_mpha8gjjcqfpetgsvgfz","tabId":"tab_mpha8gjj1ei9td1494o8n"},{"id":"node_mpha8gjjp7r1vg1mnf2n8","tabId":"tab_mpha8gjj1ei9td1494o8n"},{"id":"node_mpha8gjj1hdm70lce6vhl","tabId":"tab_mpha8gjj1ei9td1494o8n"}];
  var firstNode = {"id":"node_mpha8gjj5lppy7p7pxpi","tabId":"tab_mpha8gjjjq8yii1k0vlqo"};
  var currentTabId = null;
  var currentNodeId = null;
  var isTransitioning = false;
  var dynamicContent = document.getElementById('dynamicContent');

  // -- Helper: find node's tab --------------------------------------------
  function getNodeTabId(nodeId) {
    var node = allNodes.find(function(n) { return n.id === nodeId; });
    return node ? node.tabId : null;
  }

  // -- Header scroll-hide behaviour --------------------------------------
  var docHeader = document.getElementById('docHeader');
  if (docHeader && docHeader.classList.contains('header-scroll-hide')) {
    var lastScrollY = 0;
    var scrollTarget = document.querySelector('.dynamic-content') || window;
    var onScroll = function() {
      var y = (scrollTarget === window) ? window.scrollY : scrollTarget.scrollTop;
      if (y > lastScrollY && y > 60) {
        docHeader.classList.add('hidden-scrolled');
      } else {
        docHeader.classList.remove('hidden-scrolled');
      }
      lastScrollY = y;
    };
    scrollTarget.addEventListener('scroll', onScroll, { passive: true });
  }

  // -- TOC builder --------------------------------------------------------
  var tocLinks = document.getElementById('tocLinks');
  function buildToc() {
    if (!tocLinks) return;
    var headings = dynamicContent.querySelectorAll('h1,h2,h3,h4');
    tocLinks.innerHTML = '';
    headings.forEach(function(h) {
      if (!h.id) h.id = 'h-' + Math.random().toString(36).slice(2, 7);
      var a = document.createElement('a');
      a.className = 'toc-link';
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      a.dataset.level = h.tagName[1];
      a.addEventListener('click', function(e) {
        e.preventDefault();
        h.scrollIntoView({ behavior: 'smooth' });
      });
      tocLinks.appendChild(a);
    });
  }

  // -- Load node content from template with crossfade ---------------------
  function loadNode(nodeId, updateUrl) {
    if (isTransitioning) return;
    if (nodeId === currentNodeId) return;

    var template = document.getElementById('tmpl-' + nodeId);
    if (!template) {
      console.warn('Template not found for node', nodeId);
      return;
    }

    var newTabId = getNodeTabId(nodeId);
    if (!newTabId) return;

    // Tab muss aktiv sein (sonst wechsle zuerst den Tab)
    var activeTabSection = document.querySelector('.sidebar-section.active');
    if (activeTabSection && activeTabSection.dataset.tab !== newTabId) {
      // Tab wechseln, dann diesen Node laden
      switchTab(newTabId, function() {
        loadNode(nodeId, updateUrl);
      });
      return;
    }

    isTransitioning = true;

    // Crossfade: ausblenden
    dynamicContent.classList.add('fade-out');

    setTimeout(function () {
      // Inhalt austauschen
      var clone = document.importNode(template.content, true);
      dynamicContent.innerHTML = '';
      dynamicContent.appendChild(clone);
      buildToc();

      // Aktive Klasse in Sidebar aktualisieren
      document.querySelectorAll('.nav-row').forEach(function(row) {
        row.classList.remove('active');
      });
      document.querySelectorAll('.nav-row[data-node-id="' + nodeId + '"]').forEach(function(row) {
        row.classList.add('active');
      });

      currentNodeId = nodeId;
      currentTabId = newTabId;

      // URL-Hash aktualisieren (ohne History-Eintrag wenn nicht gewünscht)
      if (updateUrl !== false && window.location.hash !== '#' + nodeId) {
        history.pushState(null, '', '#' + nodeId);
      }

      // Einblenden
      dynamicContent.classList.remove('fade-out');
      setTimeout(function () {
        isTransitioning = false;
      }, 50);
    }, 150);
  }

  // -- Tab switching (erweitert: lädt ersten Node des neuen Tabs) -----------
  function switchTab(tabId, callback) {
    // Panels existieren nicht mehr, wir steuern nur Sidebar und Buttons
    document.querySelectorAll('.sidebar-section').forEach(function (s) {
      s.classList.toggle('active', s.dataset.tab === tabId);
    });
    document.querySelectorAll('.tab-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.tab === tabId);
    });

    // Ersten Node dieses Tabs finden
    var firstNodeInTab = allNodes.find(function(n) { return n.tabId === tabId; });
    if (firstNodeInTab) {
      loadNode(firstNodeInTab.id, true);
    } else {
      dynamicContent.innerHTML = '<div class="main"><p>No content in this tab.</p></div>';
      currentNodeId = null;
      currentTabId = tabId;
      if (callback) callback();
    }
    if (callback) callback();
    try { sessionStorage.setItem('_docActiveTab', tabId); } catch (e) {}
  }

  // -- Nav group toggle (unverändert) --------------------------------------
  function toggleNavGroup(groupId) {
    var group = document.getElementById(groupId);
    if (!group) return;
    group.classList.toggle('collapsed');
  }

  // -- Event handling -----------------------------------------------------
  // Sidebar-Klicks (Delegation)
  document.body.addEventListener('click', function(e) {
    var link = e.target.closest('.nav-row[data-node-id]');
    if (link && link.getAttribute('data-node-id')) {
      e.preventDefault();
      var nodeId = link.getAttribute('data-node-id');
      loadNode(nodeId, true);
    }
  });

  // Chevron-Klicks (statt inline onclick)
  document.body.addEventListener('click', function(e) {
    var btn = e.target.closest('.nav-chevron-btn');
    if (btn && btn.dataset.toggleGroup) {
      e.preventDefault();
      toggleNavGroup(btn.dataset.toggleGroup);
      return;
    }

    var link = e.target.closest('.nav-row[data-node-id]');
    if (link && link.getAttribute('data-node-id')) {
      e.preventDefault();
      loadNode(link.getAttribute('data-node-id'), true);
    }
  });

  // Tab-Klicks
  var tabNav = document.getElementById('tabNav');
  if (tabNav) {
    tabNav.addEventListener('click', function (e) {
      var btn = e.target.closest('.tab-btn');
      if (btn && btn.dataset.tab) {
        switchTab(btn.dataset.tab);
      }
    });
  }

  // Hash-Änderungen (z. B. Browser Zurück/Vorwärts)
  window.addEventListener('hashchange', function() {
    var hash = window.location.hash.slice(1);
    if (hash && allNodes.some(function(n) { return n.id === hash; })) {
      loadNode(hash, false);
    } else if (firstNode) {
      loadNode(firstNode.id, true);
    }
  });

  // -- Initialisierung (wie gehabt) ---------------------------------------
  var savedTab = null;
  try { savedTab = sessionStorage.getItem('_docActiveTab'); } catch (e) {}
  var initialTab = (savedTab && allNodes.some(function(n) { return n.tabId === savedTab; })) ? savedTab : (firstNode ? firstNode.tabId : null);
  
  var hashNodeId = window.location.hash.slice(1);
  var initialNodeId = null;
  if (hashNodeId && allNodes.some(function(n) { return n.id === hashNodeId; })) {
    initialNodeId = hashNodeId;
  } else if (firstNode) {
    initialNodeId = firstNode.id;
  }

  if (initialTab) {
    document.querySelectorAll('.sidebar-section').forEach(function (s) {
      s.classList.toggle('active', s.dataset.tab === initialTab);
    });
    document.querySelectorAll('.tab-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.tab === initialTab);
    });
  }

  if (initialNodeId) {
    loadNode(initialNodeId, false);
  }
