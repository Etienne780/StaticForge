    <template id="tmpl-node_mqxxat6y11ul8xo16n3dqv">
  <div class="main" data-node-id="node_mqxxat6y11ul8xo16n3dqv" data-tab-id="tab_mqxxat6yfsydmz1fj4cu7">
    <section id="node_mqxxat6y11ul8xo16n3dqv" class="export-section">
    
    <div class="export-section__body"><h1>Getting Started</h1>
<p>StaticForge is an asset archive system for bundling and loading game files. It combines multiple files into a compact <code>.sfpak</code> container that can be efficiently read at runtime.</p>
<h2>What you get</h2>
<ul><li>A command-line tool (<code>StaticForgeTool</code>) to pack your assets during your build process</li><li>A C++ library (<code>StaticForgeCore</code>) to load assets from <code>.sfpak</code> files at runtime</li></ul>
<h2>Typical workflow</h2>
<ol><li>Organize your asset folders</li><li>Optionally add <code>.sfpak.meta</code> files to control how folders are grouped into archives</li><li>Run <code>StaticForgeTool</code> to pack your assets into one or more <code>.sfpak</code> files</li><li>At runtime, use <code>StaticForgeReader</code> and <code>StaticForgeArchive</code> to load assets by path</li></ol>
<hr>
<blockquote><strong>Tip:</strong> <code>.sfpak</code> files are binary and not meant to be edited manually. Always rebuild them from source assets using the tool.</blockquote></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6y1fcbqfva3lj1l">
  <div class="main" data-node-id="node_mqxxat6y1fcbqfva3lj1l" data-tab-id="tab_mqxxat6yfsydmz1fj4cu7">
    <section id="node_mqxxat6y1fcbqfva3lj1l" class="export-section">
    
    <div class="export-section__body"><h1>Packing Assets</h1>
<p>Use <code>StaticForgeTool</code> to pack a folder of assets into a <code>.sfpak</code> archive.</p>
<h2>Basic usage</h2>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./assets --output ./build</code></pre><div class="code-language-tag">bash</div></div>
<p>This scans <code>./assets</code> recursively and writes the archive to <code>./build/main.sfpak</code>.</p>
<h2>Specifying an archive name</h2>
<p>By default the archive is named <code>main</code>. Use <code>--name</code> to override:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./assets --output ./build --name textures</code></pre><div class="code-language-tag">bash</div></div>
<p>This produces <code>./build/textures.sfpak</code>.</p>
<h2>Multiple source folders</h2>
<p><code>--source</code> can be repeated to include multiple directories:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./textures --source ./audio --output ./build</code></pre><div class="code-language-tag">bash</div></div>
or
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source &quot;./textures, ./audio&quot; --output ./build</code></pre><div class="code-language-tag">bash</div></div>
<h2>Creating the output directory automatically</h2>
<p>If the output directory doesn't exist yet, add <code>--mkdir</code>:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./assets --output ./build/packed --mkdir true</code></pre><div class="code-language-tag">bash</div></div>
<h2>Verbose output</h2>
<p>Add <code>--verbose</code> (or <code>-v</code>) to print detailed information about every file processed:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --source ./assets --output ./build --verbose</code></pre><div class="code-language-tag">bash</div></div></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6yher3crulfll">
  <div class="main" data-node-id="node_mqxxat6yher3crulfll" data-tab-id="tab_mqxxat6yfsydmz1fj4cu7">
    <section id="node_mqxxat6yher3crulfll" class="export-section">
    
    <div class="export-section__body"><h1>Meta Files</h1>
<p>Meta files let you split assets from a single source tree into multiple <code>.sfpak</code> archives automatically.</p>
<h2>File format</h2>
<p>A meta file has the extension <code>.sfpak.meta</code> and uses a simple semicolon-terminated key-value syntax:</p>
<div class="code-block-wrapper"><pre><code>archive = textures;
exclude = .png, .jpg;
storenames = true;</code></pre></div>
<p>Each statement is a <code>key = value;</code> pair. Whitespace around <code>=</code> and <code>;</code> is ignored.</p>
<p>Comments start with <code>#</code> and run to the end of the line:</p>
<div class="code-block-wrapper"><pre><code># pack all UI assets together
archive = ui;
exclude = .psd; # skip source files</code></pre></div>
<h2>Supported parameters</h2>
<table><thead><tr><th>Key</th><th>Type</th><th>Required</th><th>Description</th></tr></thead><tbody><tr><td><code>archive</code></td><td>string</td><td>yes</td><td>Name for the <code>.sfpak</code> archive produced from this directory</td></tr><tr><td><code>exclude</code></td><td>string[]</td><td>no</td><td>Comma-separated list of file extensions to skip (e.g. <code>.png</code>)</td></tr><tr><td><code>store-names</code></td><td>bool</td><td>no</td><td>Store original filenames in the archive for debug inspection</td></tr><tr><td><code>compress</code></td><td>bool</td><td>no</td><td>Compresses files larger than 4096 bytes before storing them in the archive.</td></tr></tbody></table>
Example with all parameters:
<div class="code-block-wrapper"><pre><code>archive = main;
exclude = .png, .jpg, .vert, .help;
store-names = true;
compress = false;</code></pre></div>
<h2>How it works</h2>
<p>When the tool scans your source directories it looks for <code>.sfpak.meta</code> files. Every asset file in the same directory (or any subdirectory) is then packed into the archive named in that meta file. Excluded extensions are skipped entirely.</p>
<div class="code-block-wrapper"><pre><code>assets/
  textures/
    textures.sfpak.meta   &lt;- archive = textures; exclude = .psd;
    background.png
    ui.png
  audio/
    audio.sfpak.meta      &lt;- archive = audio;
    music.ogg
    sfx.wav
  scripts/
    game.lua              &lt;- no meta file → goes into the default archive</code></pre></div>
<p>Running the tool on <code>assets/</code> produces:<br><ul><li><code>textures.sfpak</code></li><li><code>audio.sfpak</code></li><li><code>main.sfpak</code> (for everything without a meta file)</li></ul></p>
<h2>Fallback</h2>
<p>Files that are not covered by any meta file are packed into the archive name set with <code>--name</code> (default: <code>main</code>).</p>
<h2>storenames override</h2>
<p>If <code>--store-names</code> is passed on the command line, name storage is enabled globally for <strong>all</strong> archives — even those whose meta file sets <code>store-names = false</code>. The meta value only takes effect when the CLI flag is not set.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6y1fwh7al1k5upx">
  <div class="main" data-node-id="node_mqxxat6y1fwh7al1k5upx" data-tab-id="tab_mqxxat6yfsydmz1fj4cu7">
    <section id="node_mqxxat6y1fwh7al1k5upx" class="export-section">
    
    <div class="export-section__body"><h1>Inspecting Archives</h1>
<p>Use <code>--info</code> to display header and index information of one or more existing <code>.sfpak</code> files without extracting anything.</p>
<h2>Basic info</h2>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --info ./build/textures.sfpak</code></pre><div class="code-language-tag">bash</div></div>
<p>Output:</p>
<div class="code-block-wrapper"><pre><code>Archive: textures.sfpak
Version: 1
File count: 42
Index offset: 32
Index size: 1176
Data offset: 4096</code></pre></div>
<h2>Inspecting multiple archives at once</h2>
<p><code>--info</code> can be repeated to inspect several archives in one invocation:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --info ./build/textures.sfpak --info ./build/audio.sfpak</code></pre><div class="code-language-tag">bash</div></div>
<p>Each archive is printed in sequence with a separator between them.</p>
<h2>Verbose index listing</h2>
<p>Add <code>--verbose</code> to also print every index entry:</p>
<div class="code-block-wrapper"><pre><code>StaticForgeTool --info ./build/textures.sfpak --verbose</code></pre><div class="code-language-tag">bash</div></div>
<p>Output includes a line per file showing its hash, byte offset, size, and checksum:</p>
<div class="code-block-wrapper"><pre><code>Index entries:
  [0] hash: 12938471234  offset: 4096    size: 204800  checksum: 3421543
  [1] hash: 98712634521  offset: 208896  size: 81920   checksum: 9871234
  ...</code></pre></div>
<h2>Name table</h2>
<p>If the archive was built with <code>--store-names</code> (or <code>store-names = true</code> in the meta file), the inspector also prints the name table, showing the original relative path for each entry.</p>
<blockquote><strong>Note:</strong> Without name storage the index only contains hashes. The original path is not recoverable from the archive alone — keep your source assets.</blockquote></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6yhtcphl1n5fsq9">
  <div class="main" data-node-id="node_mqxxat6yhtcphl1n5fsq9" data-tab-id="tab_mqxxat6yfsydmz1fj4cu7">
    <section id="node_mqxxat6yhtcphl1n5fsq9" class="export-section">
    
    <div class="export-section__body"><h1>Loading Assets at Runtime</h1>
<p>At runtime, use <code>StaticForgeReader</code> to open a <code>.sfpak</code> file and <code>StaticForgeArchive</code> to load individual assets.</p>
<h2>Opening an archive</h2>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_keyword">#</span><span class="token-type_keyword">include </span><span class="token-type_punctuation">&lt;</span><span class="token-type_string">StaticForgeCore/StaticForge.h</span><span class="token-type_punctuation">&gt;</span><span class="token-type_keyword"></span>
<span class="token-type_other"></span>
<span class="token-type_namespace">StaticForge</span><span class="token-type_operator">::</span><span class="token-type_identifier">StaticForgeArchive</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">;</span>
<span class="token-type_namespace">StaticForge</span><span class="token-type_operator">::</span><span class="token-type_identifier">StaticForgeReader</span><span class="token-type_other"> </span><span class="token-type_identifier">reader</span><span class="token-type_punctuation">;</span>
<span class="token-type_other"></span>
<span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_operator">!</span><span class="token-type_identifier">reader</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">Load</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">./build/textures.sfpak"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_operator">&amp;</span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">))</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_comment">// reader.GetError() contains a description of what went wrong</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">reader</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Loading a file by path</h2>
<p>Pass the <strong>relative path</strong> of the file exactly as it appeared under the source directory:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">vector</span><span class="token-type_operator">&lt;</span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_identifier">byte</span><span class="token-type_operator">&gt;</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">;</span>
<span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_operator">!</span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">LoadAsset</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">textures/background.png"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">))</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span>
<span class="token-type_comment">// data now contains the raw bytes of the file</span></pre><div class="code-language-tag">cpp</div></div>
<blockquote><strong>Important:</strong> The asset path must exactly match the path relative to the source root. Slashes are normalized internally, but typos or case mismatches will prevent the asset from being found.</blockquote>
<h2>Managing the file stream</h2>
<p>After <code>StaticForgeReader::Load</code> succeeds, the archive's file stream is open. <code>LoadAsset</code> reopens it automatically if it was closed. You can control this manually:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">CloseFileStream</span><span class="token-type_punctuation">();</span><span class="token-type_other"> </span><span class="token-type_comment">// release the file handle</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">OpenFileStream</span><span class="token-type_punctuation">();</span><span class="token-type_other">  </span><span class="token-type_comment">// reopen when needed</span>
<span class="token-type_type">bool</span><span class="token-type_other"> </span><span class="token-type_identifier">open</span><span class="token-type_other"> </span><span class="token-type_operator">=</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">IsFileStreamOpen</span><span class="token-type_punctuation">();</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Memory-mapped access</h2>
<p>For better read performance, the archive can be opened using memory mapping instead of a file stream. This avoids repeated <code>seek</code>/<code>read</code> calls and lets the OS manage page caching.</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_operator">!</span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">OpenMapped</span><span class="token-type_punctuation">())</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span>
<span class="token-type_other"></span>
<span class="token-type_comment">// Zero-copy view — valid only while the archive stays mapped</span>
<span class="token-type_namespace">StaticForge</span><span class="token-type_operator">::</span><span class="token-type_identifier">AssetView</span><span class="token-type_other"> </span><span class="token-type_identifier">view</span><span class="token-type_other"> </span><span class="token-type_operator">=</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetAssetMapped</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">textures/background.png"</span><span class="token-type_punctuation">);</span>
<span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_identifier">view</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">data</span><span class="token-type_other"> </span><span class="token-type_operator">==</span><span class="token-type_other"> </span><span class="token-type_literal">nullptr</span><span class="token-type_punctuation">)</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span>
<span class="token-type_other"></span>
<span class="token-type_comment">// Or copy into a buffer, same as LoadAsset</span>
<span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">vector</span><span class="token-type_operator">&lt;</span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_identifier">byte</span><span class="token-type_operator">&gt;</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">;</span>
<span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_operator">!</span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">LoadAssetMapped</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">textures/background.png"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">))</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span>
<span class="token-type_other"></span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">CloseMapped</span><span class="token-type_punctuation">();</span>
<span class="token-type_type">bool</span><span class="token-type_other"> </span><span class="token-type_identifier">mapped</span><span class="token-type_other"> </span><span class="token-type_operator">=</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">IsMapped</span><span class="token-type_punctuation">();</span></pre><div class="code-language-tag">cpp</div></div>
<p><code>GetAssetMapped</code> returns a non-owning <code>AssetView</code> directly into mapped memory — no allocation or copy needed. The view becomes invalid as soon as <code>CloseMapped</code> is called.</p>
<blockquote><strong>Important:</strong> Memory-mapped access is <strong>not supported for compressed assets</strong>. Calling <code>GetAssetMapped</code> or <code>LoadAssetMapped</code> on a compressed entry will return an error. Use <code>LoadAsset</code> (stream-based) instead, which handles decompression automatically.</blockquote>
<h2>Compression</h2>
<p>Assets can be stored compressed inside an archive. This is transparent when using the stream-based API — <code>LoadAsset</code> detects compressed entries and decompresses them automatically before returning the data:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_comment">// Works for both compressed and uncompressed assets</span>
<span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">vector</span><span class="token-type_operator">&lt;</span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_identifier">byte</span><span class="token-type_operator">&gt;</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">;</span>
<span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_operator">!</span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">LoadAsset</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">maps/level1.map"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">))</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span></pre><div class="code-language-tag">cpp</div></div>
<p>Internally, compressed archives use per-block framing: each 4096-byte chunk is compressed independently and prefixed with its compressed and original size. This means the decompressor never needs to hold the entire file in memory at once.</p>
<p>Whether an entry is compressed can be determined from the index — if <code>compressedFileSize != 0</code> the entry is compressed, otherwise it is stored raw.</p>
<table><thead><tr><th>Access method</th><th>Uncompressed</th><th>Compressed</th></tr></thead><tbody><tr><td><code>LoadAsset</code></td><td>✅</td><td>✅ (auto-decompress)</td></tr><tr><td><code>LoadAssetMapped</code></td><td>✅</td><td>❌ not supported</td></tr><tr><td><code>GetAssetMapped</code></td><td>✅</td><td>❌ not supported</td></tr></tbody></table>
<h2>Error handling</h2>
<p>Both <code>StaticForgeReader</code> and <code>StaticForgeArchive</code> expose error messages. Always check the return value and read <code>GetError()</code> when it returns <code>false</code>:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_operator">!</span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">LoadAsset</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">audio/music.ogg"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">))</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_comment">// possible reasons: key not found, seek failure, checksum mismatch,</span>
<span class="token-type_other">    </span><span class="token-type_comment">// decompression failure, or compressed asset accessed via mmap</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span></pre><div class="code-language-tag">cpp</div></div></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6y4wn1v0cx7zsh">
  <div class="main" data-node-id="node_mqxxat6y4wn1v0cx7zsh" data-tab-id="tab_mqxxat6yfsydmz1fj4cu7">
    <section id="node_mqxxat6y4wn1v0cx7zsh" class="export-section">
    
    <div class="export-section__body"><h1>Building Archives in Code</h1>
<p>Instead of using the command-line tool you can drive the build process directly from C++ using <code>StaticForgeBuilder</code>.</p>
<h2>Minimal example</h2>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_keyword">#</span><span class="token-type_keyword">include </span><span class="token-type_punctuation">&lt;</span><span class="token-type_string">StaticForgeCore/StaticForge.h</span><span class="token-type_punctuation">&gt;</span><span class="token-type_keyword"></span>
<span class="token-type_other"></span>
<span class="token-type_namespace">StaticForge</span><span class="token-type_operator">::</span><span class="token-type_identifier">StaticForgeBuilder</span><span class="token-type_other"> </span><span class="token-type_identifier">builder</span><span class="token-type_punctuation">;</span>
<span class="token-type_identifier">builder</span>
<span class="token-type_other">    </span><span class="token-type_punctuation">.</span><span class="token-type_identifier">SetArchiveName</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">textures"</span><span class="token-type_punctuation">)</span>
<span class="token-type_other">    </span><span class="token-type_punctuation">.</span><span class="token-type_identifier">AddSourcePath</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">./assets/textures"</span><span class="token-type_punctuation">)</span>
<span class="token-type_other">    </span><span class="token-type_punctuation">.</span><span class="token-type_identifier">SetOutputPath</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">./build"</span><span class="token-type_punctuation">)</span>
<span class="token-type_other">    </span><span class="token-type_punctuation">.</span><span class="token-type_identifier">SetCreateOutputDir</span><span class="token-type_punctuation">(</span><span class="token-type_literal">true</span><span class="token-type_punctuation">);</span>
<span class="token-type_other"></span>
<span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_operator">!</span><span class="token-type_identifier">builder</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">Build</span><span class="token-type_punctuation">())</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">builder</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Multiple source paths</h2>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_identifier">builder</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">SetSourcePath</span><span class="token-type_punctuation">({</span>
<span class="token-type_other">    </span><span class="token-type_string">"</span><span class="token-type_string">./assets/textures"</span><span class="token-type_punctuation">,</span>
<span class="token-type_other">    </span><span class="token-type_string">"</span><span class="token-type_string">./assets/audio"</span>
<span class="token-type_punctuation">});</span></pre><div class="code-language-tag">cpp</div></div>
<p>or add them one at a time:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_identifier">builder</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">AddSourcePath</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">./assets/textures"</span><span class="token-type_punctuation">);</span>
<span class="token-type_identifier">builder</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">AddSourcePath</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">./assets/audio"</span><span class="token-type_punctuation">);</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Fluent API</h2>
<p>All setters return <code>*this</code> so they can be chained:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_namespace">StaticForge</span><span class="token-type_operator">::</span><span class="token-type_identifier">StaticForgeBuilder</span><span class="token-type_other"> </span><span class="token-type_identifier">builder</span><span class="token-type_punctuation">{</span><span class="token-type_other"> </span><span class="token-type_string">"</span><span class="token-type_string">main"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span><span class="token-type_other"> </span><span class="token-type_string">"</span><span class="token-type_string">./assets"</span><span class="token-type_other"> </span><span class="token-type_punctuation">},</span><span class="token-type_other"> </span><span class="token-type_string">"</span><span class="token-type_string">./build"</span><span class="token-type_other"> </span><span class="token-type_punctuation">};</span>
<span class="token-type_identifier">builder</span>
<span class="token-type_other">    </span><span class="token-type_punctuation">.</span><span class="token-type_identifier">SetCreateOutputDir</span><span class="token-type_punctuation">(</span><span class="token-type_literal">true</span><span class="token-type_punctuation">)</span>
<span class="token-type_other">    </span><span class="token-type_punctuation">.</span><span class="token-type_identifier">SetDebugMode</span><span class="token-type_punctuation">(</span><span class="token-type_literal">true</span><span class="token-type_punctuation">)</span>
<span class="token-type_other">    </span><span class="token-type_punctuation">.</span><span class="token-type_identifier">Build</span><span class="token-type_punctuation">();</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Debug mode</h2>
<p><code>SetDebugMode(true)</code> prints detailed progress to <code>stdout</code> - the same output as <code>--verbose</code> in the CLI tool.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6ydi3e721h773b2">
  <div class="main" data-node-id="node_mqxxat6ydi3e721h773b2" data-tab-id="tab_mqxxat6yfsydmz1fj4cu7">
    <section id="node_mqxxat6ydi3e721h773b2" class="export-section">
    
    <div class="export-section__body"><h1>CLI Reference</h1>
<p>Quick reference for all <code>StaticForgeTool</code> arguments.</p>
<h2>Arguments</h2>
<table><thead><tr><th>Argument</th><th>Short</th><th>Description</th><th>Type</th><th>Default</th><th>Multi</th></tr></thead><tbody><tr><td><code>--source</code></td><td><code>--src</code></td><td>Source path(s) of the files to be packed (can be specified multiple times)</td><td>filepath</td><td>—</td><td>yes</td></tr><tr><td><code>--output</code></td><td><code>--o</code></td><td>Output directory for the <code>.sfpak</code> file</td><td>filepath</td><td>—</td><td>no</td></tr><tr><td><code>--name</code></td><td><code>--n</code></td><td>Default archive name when no <code>.sfpak.meta</code> file is found</td><td>string</td><td><code>main</code></td><td>no</td></tr><tr><td><code>--mkdir</code></td><td><code>--p</code></td><td>Create the output directory if it does not exist</td><td>bool</td><td>false</td><td>no</td></tr><tr><td><code>--info</code></td><td><code>--i</code></td><td>Display header and index info of a <code>.sfpak</code> file (can be repeated)</td><td>filepath</td><td>—</td><td>yes</td></tr><tr><td><code>--verbose</code></td><td><code>--v</code></td><td>Enable debug/verbose console output</td><td>bool</td><td>false</td><td>no</td></tr><tr><td><code>--store-names</code></td><td><code>--sn</code></td><td>Store original filenames in all archives for debug inspection</td><td>bool</td><td>false</td><td>no</td></tr><tr><td><code>--compress</code></td><td><code>--c</code></td><td>Compresses files larger than 4096 bytes before storing them in the archive</td><td>bool</td><td>false</td><td>no</td></tr><tr><td><code>--help</code></td><td><code>--h</code></td><td>Show this help message</td><td>—</td><td>—</td><td>no</td></tr></tbody></table>
<h2>Modes</h2>
<p>Exactly one mode must be active per invocation. Modes are determined by which arguments are provided:</p>
<table><thead><tr><th>Mode</th><th>Required arguments</th></tr></thead><tbody><tr><td>pack</td><td><code>--source</code> and <code>--output</code></td></tr><tr><td>info</td><td><code>--info</code></td></tr><tr><td>help</td><td><code>--help</code></td></tr></tbody></table>
Combining arguments from multiple modes (e.g. <code>--source</code> together with <code>--info</code>) is an error.
<h2>storenames priority</h2>
<p>When <code>--store-names</code> is set on the command line, <br>name storage is forced on for every archive regardless of what the <code>.sfpak.meta</code> file specifies. <br>The meta-file value of <code>store-names</code> is only used when the CLI flag is absent.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6y10i4iz813omdlk">
  <div class="main" data-node-id="node_mqxxat6y10i4iz813omdlk" data-tab-id="tab_mqxxat6ymu9lpd15crqng">
    <section id="node_mqxxat6y10i4iz813omdlk" class="export-section">
    
    <div class="export-section__body"><h1>Architecture</h1>
<p>StaticForge is split into two main components.</p>
<h2>StaticForgeCore</h2>
<p>The core static library. Contains all format logic and is linked by both the tool and any consuming application:</p>
<ul><li>Archive format definition and binary layout</li><li><code>StaticForgeBuilder</code> - writes <code>.sfpak</code> files</li><li><code>StaticForgeReader</code> - reads and validates <code>.sfpak</code> files</li><li><code>StaticForgeArchive</code> - runtime handle for an open archive</li><li>Meta file parsing (<code>StaticForgeMeta</code>)</li><li>Internal helpers: hashing, alignment, endian handling, error support</li></ul>
<h2>StaticForgeTool</h2>
<p>The CLI executable. Wraps <code>StaticForgeCore</code> with argument parsing and three modes: pack, info, help. Does not contain any format logic itself.</p>
<h2>Dependency graph</h2>
<div class="code-block-wrapper"><pre><code>StaticForgeTool
    └── StaticForgeCore
            ├── StaticForgeBuilder
            ├── StaticForgeReader
            ├── StaticForgeArchive
            └── Internal (helpers, meta, hashing)

Your Game / Application
    └── StaticForgeCore
            ├── StaticForgeReader
            └── StaticForgeArchive</code></pre></div>
<p>The tool-side classes (<code>StaticForgeBuilder</code>, meta parsing) are compiled into Core but an application that only reads archives still links the same library - there is currently no separate runtime-only build target.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6y6g15qmm3z2y3">
  <div class="main" data-node-id="node_mqxxat6y6g15qmm3z2y3" data-tab-id="tab_mqxxat6ymu9lpd15crqng">
    <section id="node_mqxxat6y6g15qmm3z2y3" class="export-section">
    
    <div class="export-section__body"><h1>File Format</h1>
<p>A <code>.sfpak</code> file consists of three required regions and two optional regions written sequentially: <strong>Header</strong>, <strong>Index</strong>, <strong>Data</strong>, and — when name storage is enabled — <strong>Name Table Header</strong>, <strong>Name Table Entries</strong>, and <strong>Name Table String Data</strong>.</p>
<h2>Layout</h2>
<div class="code-block-wrapper"><pre><code>[ HEADER                 ]  aligned to ALIGNMENT_HEADER = 32 bytes
[ INDEX                  ]  N × sizeof(IndexEntry), then padded to ALIGNMENT_FILE = 4096
[ DATA BLOCKS            ]  files written back-to-back, each padded to ALIGNMENT_FILE = 4096
[ NAME TABLE HEADER      ]  optional — present when storenames is enabled
[ NAME TABLE ENTRIES     ]  optional — one entry per file
[ NAME TABLE STRING DATA ]  optional — raw UTF-8 path strings packed together</code></pre></div>
<h2>Header</h2>
<p>Magic bytes <code>SFPK</code> followed by six <code>uint64_t</code> fields. Written little-endian on all platforms.</p>
<table><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead><tbody><tr><td><code>magic</code></td><td><code>char[4]</code></td><td>Always <code>S</code>, <code>F</code>, <code>P</code>, <code>K</code></td></tr><tr><td><code>version</code></td><td><code>uint64_t</code></td><td>Format version (currently <code>2</code>)</td></tr><tr><td><code>fileCount</code></td><td><code>uint64_t</code></td><td>Number of files in this archive</td></tr><tr><td><code>indexOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the start of the index</td></tr><tr><td><code>indexSize</code></td><td><code>uint64_t</code></td><td>Total size of the index in bytes</td></tr><tr><td><code>dataOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the start of data</td></tr><tr><td><code>nameTableHeaderOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the Name Table Header, or <code>0</code> if not present</td></tr></tbody></table>
<h2>Index entry</h2>
<p>One entry per file, stored contiguously starting at <code>indexOffset</code>.</p>
<table><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead><tbody><tr><td><code>hashName</code></td><td><code>uint64_t</code></td><td>FNV-1a hash of the relative file path</td></tr><tr><td><code>fileOffset</code></td><td><code>uint64_t</code></td><td>Byte offset of the file's data block relative to <code>dataOffset</code></td></tr><tr><td><code>fileSize</code></td><td><code>uint64_t</code></td><td>Original (uncompressed) file size in bytes</td></tr><tr><td><code>compressedFileSize</code></td><td><code>uint64_t</code></td><td>Total compressed bytes on disk, excluding framing headers. <code>0</code> means stored uncompressed</td></tr><tr><td><code>filePadding</code></td><td><code>uint32_t</code></td><td>Padding bytes appended after the file data to reach the next 4096-byte boundary</td></tr><tr><td><code>checksum</code></td><td><code>uint32_t</code></td><td>FNV-1a checksum of the data as written on disk (covers framing headers + compressed data)</td></tr></tbody></table>
<h2>Data blocks</h2>
<p>Each file occupies one data block starting at <code>dataOffset + fileOffset</code>. The block is always padded with zero bytes to the next 4096-byte boundary; the padding size is stored in <code>filePadding</code>.</p>
<p>When <code>compressedFileSize == 0</code> the block contains the raw file bytes verbatim.</p>
<p>When <code>compressedFileSize != 0</code> the block contains a sequence of independently compressed chunks:</p>
<div class="code-block-wrapper"><pre><code>[ CHUNK 0 ][ CHUNK 1 ][ ... ][ CHUNK N ]</code></pre></div>
<p>Each chunk has the following layout:</p>
<div class="code-block-wrapper"><pre><code>[ compressedSize : uint32_t ]  size of the compressed payload that follows
[ originalSize   : uint32_t ]  size of the decompressed output for this chunk
[ payload        : bytes    ]  compressedSize bytes of compressed data</code></pre></div>
<p>Chunks are produced by splitting the original file into 4096-byte pieces and compressing each piece independently. The decompressor reads chunks sequentially until <code>compressedSize</code> bytes consumed equals <code>compressedFileSize</code>. Because each chunk carries its own original size, no global decompressed-size context is needed per chunk.</p>
<p>The FNV-1a checksum covers all chunk bytes as written on disk — framing headers included — so integrity is verified before any decompression takes place.</p>
<blockquote><strong>Note:</strong> Compressed data blocks cannot be accessed via memory mapping. Use the stream-based <code>LoadAsset</code> API which handles decompression automatically.</blockquote>
<h2>Name Table Header</h2>
<p>Present only when the archive was built with name storage enabled. Located at <code>nameTableHeaderOffset</code>.</p>
<table><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead><tbody><tr><td><code>entryOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the first Name Table Entry</td></tr><tr><td><code>stringDataOffset</code></td><td><code>uint64_t</code></td><td>Byte offset to the start of Name Table String Data</td></tr></tbody></table>
<h2>Name Table Entry</h2>
<p>One entry per file, stored contiguously starting at <code>entryOffset</code>.</p>
<table><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead><tbody><tr><td><code>hash</code></td><td><code>uint64_t</code></td><td>FNV-1a hash of the path (matches <code>hashName</code> in the corresponding index entry)</td></tr><tr><td><code>nameLength</code></td><td><code>uint32_t</code></td><td>Length of the UTF-8 path string in bytes</td></tr><tr><td><code>nameOffset</code></td><td><code>uint32_t</code></td><td>Byte offset within the String Data region where this path starts</td></tr></tbody></table>
<h2>Name Table String Data</h2>
<p>Raw UTF-8 path strings packed end-to-end with no separators. To read a filename, seek to <code>stringDataOffset + nameOffset</code> and read <code>nameLength</code> bytes.</p>
<h2>Alignment</h2>
<ul><li>The header region is padded to 32 bytes (<code>ALIGNMENT_HEADER</code>).</li><li>Every file data block is padded to 4096 bytes (<code>ALIGNMENT_FILE</code>) — one filesystem page.</li><li>Padding bytes are always zero.</li></ul>
<p>This alignment ensures that file offsets are always multiples of 4096, which allows direct memory-mapped access for uncompressed assets without additional alignment work.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6yt92zfj1uzirhr">
  <div class="main" data-node-id="node_mqxxat6yt92zfj1uzirhr" data-tab-id="tab_mqxxat6ymu9lpd15crqng">
    <section id="node_mqxxat6yt92zfj1uzirhr" class="export-section">
    
    <div class="export-section__body"><h1>Hashing</h1>
<p>StaticForge uses <strong>FNV-1a</strong> (Fowler–Noll–Vo) for two purposes: filename lookup and data integrity.</p>
<h2>Filename hashing</h2>
<p>When the builder packs a file, the relative path string (e.g. <code>textures/background.png</code>) is hashed to a <code>uint64_t</code> and stored in the index as <code>hashName</code>.</p>
<p>At runtime, <code>StaticForgeArchive::LoadAsset</code> hashes the key string you pass in and looks it up in the index map. The original string is never stored in the archive.</p>
<p><strong>Implications:</strong><br><ul><li>Lookups are O(1) via <code>std::unordered_map</code>.</li><li>The archive cannot list filenames - only validate whether a known key exists.</li><li>Hash collisions between two different paths in the same archive are detected at build time and cause an error.</li></ul></p>
<h2>Data checksum</h2>
<p>During packing, each file's raw bytes are fed through FNV-1a with the initial value <code>2166136261</code> to produce a <code>uint32_t</code> checksum. This is written back into the index entry after the data is flushed.</p>
<p>When loading, <code>StaticForgeArchive::LoadEntry</code> recomputes the checksum over the read bytes and compares it to the stored value. A mismatch causes <code>LoadAsset</code> to return <code>false</code> with an error message.</p>
<h2>Path format</h2>
<p>Use a path <strong>relative to the source root</strong> used during packing.</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_comment">// Correct</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">LoadAsset</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">textures/background.png"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">);</span>
<span class="token-type_other"></span>
<span class="token-type_comment">// Also valid</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">LoadAsset</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">textures</span><span class="token-type_escape">\\</span><span class="token-type_string">background.png"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">);</span>
<span class="token-type_other"></span>
<span class="token-type_comment">// Wrong - path is not relative to the source root</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">LoadAsset</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">./assets/textures/background.png"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">);</span></pre><div class="code-language-tag">cpp</div></div></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6y1xsg4ck16t30ny">
  <div class="main" data-node-id="node_mqxxat6y1xsg4ck16t30ny" data-tab-id="tab_mqxxat6ymu9lpd15crqng">
    <section id="node_mqxxat6y1xsg4ck16t30ny" class="export-section">
    
    <div class="export-section__body"><h1>Build Process</h1>
<p><code>StaticForgeBuilder::Build()</code> runs three internal phases in sequence.</p>
<h2>1. CheckFilepaths</h2>
<p>Validates that all source paths exist and that the output path is a directory (no file extension). If <code>SetCreateOutputDir(true)</code> was called and the directory is missing, it is created here.</p>
<h2>2. ScanFiles</h2>
<p>Recursively iterates every source path in two passes:</p>
<p><strong>Pass 1 — Meta collection:</strong>  <br>Collects all <code>.sfpak.meta</code> files and builds a <code>directory → ArchiveMeta</code> mapping. Each entry stores the archive name, excluded extensions, and the <code>storenames</code> and <code>compress</code> flags.</p>
<p><strong>Pass 2 — File assignment:</strong>  <br>Iterates all non-meta files, computes their relative path, hashes it with FNV-1a, and assigns each file to the appropriate <code>ArchiveGroup</code> by walking up the directory tree until a meta entry is found. Falls back to the default archive name if no meta file applies.</p>
<p>For each file the builder also:<br><ul><li>Detects hash collisions between files in the same group and reports them as errors.</li><li>Applies the <code>storenames</code> and <code>compress</code> overrides: if a global flag is set, it is forced on even when the meta file sets it to <code>false</code>.</li></ul></p>
<h2>3. CreateGroups</h2>
<p>For each <code>ArchiveGroup</code> the following phases run in order:</p>
<p><strong>CalculateDataStart</strong> — computes the byte offset at which file data begins. This is the sum of the aligned header size and the index table size, rounded up to the next 4096-byte boundary.</p>
<p><strong>WriteData</strong> — opens the output file and writes <code>dataStart</code> bytes of zero-padding to reserve space for the header and index, then writes all file data blocks. During this pass, <code>blockOffset</code>, <code>filePadding</code>, <code>checksum</code>, and <code>compressedFileSize</code> are filled in on each file entry so the index can be written correctly afterwards.</p>
<p><strong>WriteHeader</strong> — seeks back to offset <code>0</code> and writes the <code>StaticForgeHeader</code> struct, padded to 32 bytes.</p>
<p><strong>WriteIndex</strong> — writes one <code>StaticForgeIndexEntry</code> per file directly after the header. Checksums computed during <code>WriteData</code> are included here — no second seek is needed.</p>
<p><strong>BuildNameTable</strong> <em>(optional, when storenames is enabled)</em> — computes the byte layout of the Name Table Header, Name Table Entries, and String Data region. Offsets are appended after the last data block.</p>
<p><strong>WriteNameTable</strong> <em>(optional)</em> — seeks to <code>nameTableStart</code> (set at the end of <code>WriteData</code>) and writes the Name Table Header, Name Table Entries, and raw UTF-8 string data.</p>
<h2>Write phases summary</h2>
<table><thead><tr><th>Phase</th><th>Seeks to</th><th>What it writes</th></tr></thead><tbody><tr><td><code>WriteData</code></td><td><code>0</code> (start)</td><td><code>dataStart</code> zero-padding, then all file data blocks in order</td></tr><tr><td><code>WriteHeader</code></td><td><code>0</code> (seekp back)</td><td><code>StaticForgeHeader</code> struct padded to 32 bytes</td></tr><tr><td><code>WriteIndex</code></td><td>after header</td><td>One <code>StaticForgeIndexEntry</code> per file, including computed checksums</td></tr><tr><td><code>WriteNameTable</code></td><td><code>nameTableStart</code> (seekp forward)</td><td>Name Table Header, Name Table Entries, raw UTF-8 string data</td></tr></tbody></table>
<h2>Compression</h2>
<p>When compression is enabled for an archive group (via the meta file or the global <code>SetCompress</code> flag), files larger than one 4096-byte block are compressed. Compression is applied per-block during <code>WriteData</code>:</p>
<ul><li>Each 4096-byte read chunk is compressed independently.</li><li>Each compressed block is prefixed with a framing header: <code>[uint32_t compressedSize][uint32_t originalSize]</code>.</li><li>The raw compressed bytes follow immediately after the framing header.</li><li><code>compressedFileSize</code> in the index entry is set to the total number of compressed bytes written (excluding framing headers). A value of <code>0</code> means the entry is stored uncompressed.</li></ul>
<p>The per-block approach means the decompressor can process one chunk at a time without buffering the entire file.</p>
<p>The FNV-1a checksum covers the framing headers and compressed block data as written, so integrity verification happens before decompression.</p>
<h2>Overflow safety</h2>
<p>All size and offset arithmetic uses checked helpers that return <code>false</code> on overflow instead of wrapping silently:</p>
<table><thead><tr><th>Helper</th><th>Description</th></tr></thead><tbody><tr><td><code>SafeAddU64</code></td><td>Addition with overflow check</td></tr><tr><td><code>SafeMulU64</code></td><td>Multiplication with overflow check</td></tr><tr><td><code>SafeAlignSize</code></td><td>Rounds up to a power-of-two alignment, overflow-safe</td></tr><tr><td><code>GetHeaderSize</code></td><td>Returns the aligned header size via <code>SafeAlignSize</code></td></tr></tbody></table>
Any overflow causes <code>Build()</code> to return <code>false</code> with a descriptive error.</div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6yw42uk51d7g8fd">
  <div class="main" data-node-id="node_mqxxat6yw42uk51d7g8fd" data-tab-id="tab_mqxxat6ymu9lpd15crqng">
    <section id="node_mqxxat6yw42uk51d7g8fd" class="export-section">
    
    <div class="export-section__body"><h1>Meta File Parser</h1>
<p>Meta files use a minimal custom format parsed by <code>StaticForgeMeta</code> inside <code>StaticForgeCore</code>.</p>
<h2>Syntax</h2>
<p>Each statement is a key-value pair terminated by a semicolon:</p>
<div class="code-block-wrapper"><pre><code>key = value;</code></pre></div>
<p>Multiple statements can appear in any order:</p>
<div class="code-block-wrapper"><pre><code>archive = main;
exclude = .png, .jpg, .vert, .help;
store-names = true;</code></pre></div>
<p>Comments start with <code>#</code> and run to the end of the line:</p>
<div class="code-block-wrapper"><pre><code># this is a comment
archive = main;storenames</code></pre></div>
<h2>Tokenizer</h2>
<p><code>MetaTokenizer</code> reads the entire file into memory, then walks it character by character via <code>ProcessContent</code> → <code>ProcessChar</code>. It tracks the current line and column for error reporting and produces a flat <code>std::vector&lt;MetaToken&gt;</code>.</p>
<p><strong>Character dispatch (<code>ProcessChar</code>):</strong></p>
<table><thead><tr><th>Input</th><th>Action</th></tr></thead><tbody><tr><td>Whitespace (<code>\r</code>, <code>\n</code>, <code> </code>, <code>\t</code>)</td><td>Skipped; newlines increment the line counter</td></tr><tr><td><code>=</code></td><td>Emit <code>Assign</code></td></tr><tr><td><code>,</code></td><td>Emit <code>Separator</code></td></tr><tr><td><code>;</code></td><td>Emit <code>Delimiter</code></td></tr><tr><td><code>#</code></td><td>Call <code>SkipComment</code> — consume until <code>\n</code></td></tr><tr><td>Alpha, <code>_</code>, <code>.</code>, <code>-</code></td><td>Call <code>ReadIdentifier</code></td></tr><tr><td>Anything else</td><td>Add error, emit <code>UNKNOWN</code></td></tr></tbody></table>
<strong><code>ReadIdentifier</code>:</strong> records the start pointer, then advances <code>m_cur</code> while the character is alphanumeric, <code>_</code>, <code>.</code>, or <code>-</code>. The resulting <code>string_view</code> into the in-memory buffer is stored in the token without any heap allocation.
<p><strong>Token types:</strong></p>
<table><thead><tr><th>Token type</th><th>Description</th></tr></thead><tbody><tr><td><code>Identifier</code></td><td>An unquoted word — keys, values, extensions, booleans</td></tr><tr><td><code>Assign</code></td><td>The <code>=</code> character</td></tr><tr><td><code>Separator</code></td><td>The <code>,</code> character (used between list values like extensions)</td></tr><tr><td><code>Delimiter</code></td><td>The <code>;</code> character — terminates a statement</td></tr><tr><td><code>EndOfFile</code></td><td>Sentinel appended after the last character</td></tr><tr><td><code>UNKNOWN</code></td><td>Unrecognised character; always accompanied by an error</td></tr></tbody></table>
Every token stores its <strong>line</strong> and <strong>column</strong> at the point it was emitted.
<h2>Parser</h2>
<p><code>StaticForgeMeta::ParseTokens</code> consumes the token stream produced by <code>MetaTokenizer</code>. Each statement follows this pattern:</p>
<div class="code-block-wrapper"><pre><code>Identifier(key)  Assign  Identifier(value)  Delimiter</code></pre></div>
<p>For list values (e.g. <code>exclude</code>) the value section is instead:</p>
<div class="code-block-wrapper"><pre><code>Identifier  Separator  Identifier  Separator  ...  Identifier  Delimiter</code></pre></div>
<p>Any deviation — wrong token type, unexpected <code>EndOfFile</code>, missing <code>Delimiter</code> — is a parse error that includes the line and column of the offending token.</p>
<h2>Error suggestions</h2>
<p>If an <code>Identifier</code> key is not recognised, the parser computes the edit distance to every known key. If the closest match differs by at most 3 characters a suggestion is appended to the error:</p>
<div class="code-block-wrapper"><pre><code>Unknown key &#39;archiv&#39; at line 1, column 1. Did you mean &#39;archive&#39;?</code></pre></div>
<h2>Supported parameters</h2>
<table><thead><tr><th>Key</th><th>Type</th><th>Required</th><th>Description</th></tr></thead><tbody><tr><td><code>archive</code></td><td>string</td><td>yes</td><td>Name for the <code>.sfpak</code> archive</td></tr><tr><td><code>exclude</code></td><td>string[]</td><td>no</td><td>Comma-separated list of file extensions to skip</td></tr><tr><td><code>storen-ames</code></td><td>bool</td><td>no</td><td>Store original filenames in the archive for debug inspection</td></tr><tr><td><code>compress</code></td><td>bool</td><td>no</td><td>Compresses files larger than 4096 bytes before storing them in the archive.</td></tr></tbody></table>
<h2>Value parsing</h2>
<p><strong><code>archive</code></strong> — the <code>Identifier</code> token value is used as-is.</p>
<p><strong><code>exclude</code></strong> — after the <code>=</code>, the parser collects <code>Identifier</code> tokens separated by <code>Separator</code> (<code>,</code>) tokens until it sees a <code>Delimiter</code> (<code>;</code>). Each token value is trimmed and lowercased, so <code>.PNG</code> and <code>.png</code> are treated identically.</p>
<p><strong><code>storenames</code></strong> — the single <code>Identifier</code> token after <code>=</code> is compared case-insensitively. <code>true</code> and <code>1</code> are truthy; anything else is false.</p></div>
  </section>
  </div>
</template>
<template id="tmpl-node_mqxxat6y1y4d6wwfnklex">
  <div class="main" data-node-id="node_mqxxat6y1y4d6wwfnklex" data-tab-id="tab_mqxxat6ymu9lpd15crqng">
    <section id="node_mqxxat6y1y4d6wwfnklex" class="export-section">
    
    <div class="export-section__body"><h1>StaticForgeArchive</h1>
<p><code>StaticForgeArchive</code> is the runtime handle for a loaded <code>.sfpak</code> file. It is populated by <code>StaticForgeReader::Load</code> and then used to retrieve asset data.</p>
<h2>Ownership and move semantics</h2>
<p><code>StaticForgeArchive</code> is move-only. Copying is deleted because it owns an open <code>std::ifstream</code>.</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_namespace">StaticForge</span><span class="token-type_operator">::</span><span class="token-type_identifier">StaticForgeArchive</span><span class="token-type_other"> </span><span class="token-type_identifier">a</span><span class="token-type_punctuation">;</span>
<span class="token-type_namespace">StaticForge</span><span class="token-type_operator">::</span><span class="token-type_identifier">StaticForgeArchive</span><span class="token-type_other"> </span><span class="token-type_identifier">b</span><span class="token-type_other"> </span><span class="token-type_operator">=</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_function">move</span><span class="token-type_punctuation">(</span><span class="token-type_identifier">a</span><span class="token-type_punctuation">);</span><span class="token-type_other"> </span><span class="token-type_comment">// OK</span>
<span class="token-type_namespace">StaticForge</span><span class="token-type_operator">::</span><span class="token-type_identifier">StaticForgeArchive</span><span class="token-type_other"> </span><span class="token-type_identifier">c</span><span class="token-type_other"> </span><span class="token-type_operator">=</span><span class="token-type_other"> </span><span class="token-type_identifier">a</span><span class="token-type_punctuation">;</span><span class="token-type_other">            </span><span class="token-type_comment">// compile error</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Internal state</h2>
<table><thead><tr><th>Member</th><th>Description</th></tr></thead><tbody><tr><td><code>m_path</code></td><td>Path to the <code>.sfpak</code> file on disk</td></tr><tr><td><code>m_stream</code></td><td><code>std::ifstream</code> used for stream-based reads</td></tr><tr><td><code>m_mmap</code></td><td><code>std::unique_ptr&lt;Internal::MmapFile&gt;</code> used for memory mapping</td></tr><tr><td><code>m_compressor</code></td><td><code>std::unique_ptr&lt;Internal::LZ4Compression&gt;</code> used for decompression</td></tr><tr><td><code>m_header</code></td><td>Parsed <code>StaticForgeHeader</code> struct</td></tr><tr><td><code>m_indexEntries</code></td><td><code>std::vector&lt;StaticForgeIndexEntry&gt;</code> — one per file</td></tr><tr><td><code>m_hashNameToEntry</code></td><td><code>std::unordered_map&lt;uint64_t, size_t&gt;</code> for O(1) lookup</td></tr><tr><td><code>m_indexToName</code></td><td><code>std::unordered_map&lt;size_t, std::string&gt;</code> for reverse name lookup</td></tr></tbody></table>
<h2>LoadAsset flow</h2>
<ol><li>Hash the key string with <code>HashFilename</code>.</li><li>Look up the hash in <code>m_hashNameToEntry</code> to find the index position.</li><li>Call <code>LoadEntry</code>:</li></ol>
<ul><li>If <code>compressedFileSize == 0</code> (uncompressed): seek to <code>dataOffset + fileOffset</code>, read <code>fileSize</code> bytes, validate the FNV-1a checksum, return the raw bytes.</li><li>If <code>compressedFileSize != 0</code> (compressed): seek to <code>dataOffset + fileOffset</code>, read <code>compressedFileSize</code> bytes, validate the checksum, then decompress block by block. Each block is prefixed with <code>[uint32_t compressedSize][uint32_t originalSize]</code> and decompressed independently until all bytes are consumed. The reassembled output must equal <code>fileSize</code> bytes.</li></ul>
<ol><li>Return the decompressed (or raw) bytes in <code>outData</code>.</li></ol>
<h2>LoadAssetMapped / GetAssetMapped flow</h2>
<ol><li>Verify the archive is memory-mapped (<code>IsMapped()</code>).</li><li>Hash the key and look up the index entry.</li><li><strong>Reject compressed entries</strong> — if <code>compressedFileSize != 0</code>, add an error and return <code>false</code> / empty view. Use <code>LoadAsset</code> instead for compressed assets.</li><li>Verify the range <code>[dataOffset + fileOffset, fileSize]</code> is within the mapped region.</li><li><code>GetAssetMapped</code> returns a non-owning <code>AssetView</code> pointing directly into mapped memory — no copy.</li></ol>
   <code>LoadAssetMapped</code> validates the checksum first, then copies the bytes into <code>outData</code>.
<blockquote>The <code>AssetView</code> is only valid while the archive remains mapped. Call <code>CloseMapped</code> only after you are done with all views.</blockquote>
<h2>Access method comparison</h2>
<table><thead><tr><th>Method</th><th>Compressed</th><th>Allocates</th><th>Copies data</th></tr></thead><tbody><tr><td><code>LoadAsset</code></td><td>✅</td><td>✅</td><td>✅</td></tr><tr><td><code>LoadAssetMapped</code></td><td>❌</td><td>✅</td><td>✅</td></tr><tr><td><code>GetAssetMapped</code></td><td>❌</td><td>❌</td><td>❌</td></tr></tbody></table>
<h2>Accessor methods</h2>
<p>All getters read directly from <code>m_header</code> or <code>m_indexEntries</code> and are cheap:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetVersion</span><span class="token-type_punctuation">();</span><span class="token-type_other">       </span><span class="token-type_comment">// uint64_t</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetFileCount</span><span class="token-type_punctuation">();</span><span class="token-type_other">     </span><span class="token-type_comment">// size_t</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetIndexOffset</span><span class="token-type_punctuation">();</span><span class="token-type_other">   </span><span class="token-type_comment">// uint64_t</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetIndexSize</span><span class="token-type_punctuation">();</span><span class="token-type_other">     </span><span class="token-type_comment">// uint64_t</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetDataOffset</span><span class="token-type_punctuation">();</span><span class="token-type_other">    </span><span class="token-type_comment">// uint64_t</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">StoresNames</span><span class="token-type_punctuation">();</span><span class="token-type_other">      </span><span class="token-type_comment">// bool — true if name table is present</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetHashName</span><span class="token-type_punctuation">(</span><span class="token-type_identifier">i</span><span class="token-type_punctuation">);</span><span class="token-type_other">     </span><span class="token-type_comment">// uint64_t</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetFileOffset</span><span class="token-type_punctuation">(</span><span class="token-type_identifier">i</span><span class="token-type_punctuation">);</span><span class="token-type_other">   </span><span class="token-type_comment">// uint64_t</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetFileSize</span><span class="token-type_punctuation">(</span><span class="token-type_identifier">i</span><span class="token-type_punctuation">);</span><span class="token-type_other">     </span><span class="token-type_comment">// uint64_t</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetFilePadding</span><span class="token-type_punctuation">(</span><span class="token-type_identifier">i</span><span class="token-type_punctuation">);</span><span class="token-type_other">  </span><span class="token-type_comment">// uint64_t</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetName</span><span class="token-type_punctuation">(</span><span class="token-type_identifier">i</span><span class="token-type_punctuation">);</span><span class="token-type_other">         </span><span class="token-type_comment">// std::string — empty if name table not present</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Managing the file stream</h2>
<p>After <code>StaticForgeReader::Load</code> succeeds the archive's file stream is open. <code>LoadAsset</code> reopens it automatically if it was closed. You can control this manually:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">CloseFileStream</span><span class="token-type_punctuation">();</span><span class="token-type_other"> </span><span class="token-type_comment">// release the file handle</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">OpenFileStream</span><span class="token-type_punctuation">();</span><span class="token-type_other">  </span><span class="token-type_comment">// reopen when needed</span>
<span class="token-type_type">bool</span><span class="token-type_other"> </span><span class="token-type_identifier">open</span><span class="token-type_other"> </span><span class="token-type_operator">=</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">IsFileStreamOpen</span><span class="token-type_punctuation">();</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Managing memory mapping</h2>
<p>Memory mapping is independent of the file stream and must be opened explicitly:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">OpenMapped</span><span class="token-type_punctuation">();</span><span class="token-type_other">  </span><span class="token-type_comment">// map the file into memory</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">IsMapped</span><span class="token-type_punctuation">();</span><span class="token-type_other">    </span><span class="token-type_comment">// bool</span>
<span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">CloseMapped</span><span class="token-type_punctuation">();</span><span class="token-type_other"> </span><span class="token-type_comment">// unmap — invalidates all AssetViews</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Error handling</h2>
<p>Both <code>StaticForgeReader</code> and <code>StaticForgeArchive</code> support error messages. Always check the return value and read <code>GetError()</code> when it returns <code>false</code>:</p>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_operator">!</span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">LoadAsset</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">audio/music.ogg"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">))</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_comment">// possible reasons: key not found, seek/read failure,</span>
<span class="token-type_other">    </span><span class="token-type_comment">// checksum mismatch, decompression failure</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span>
<span class="token-type_other"></span>
<span class="token-type_keyword">if</span><span class="token-type_other"> </span><span class="token-type_punctuation">(</span><span class="token-type_operator">!</span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">LoadAssetMapped</span><span class="token-type_punctuation">(</span><span class="token-type_string">"</span><span class="token-type_string">textures/ui.png"</span><span class="token-type_punctuation">,</span><span class="token-type_other"> </span><span class="token-type_identifier">data</span><span class="token-type_punctuation">))</span><span class="token-type_other"> </span><span class="token-type_punctuation">{</span>
<span class="token-type_other">    </span><span class="token-type_comment">// additional possible reason: entry is compressed</span>
<span class="token-type_other">    </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">cerr </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_identifier">archive</span><span class="token-type_punctuation">.</span><span class="token-type_identifier">GetError</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_operator">&lt;&lt;</span><span class="token-type_other"> </span><span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_variable">endl</span><span class="token-type_punctuation">;</span>
<span class="token-type_punctuation">}</span></pre><div class="code-language-tag">cpp</div></div></div>
