<template id="tmpl-node_mqxxat6y1a0pqlx1rioe3v">
  <div class="main" data-node-id="node_mqxxat6y1a0pqlx1rioe3v" data-tab-id="tab_mqxxat6ymu9lpd15crqng">
    <section id="node_mqxxat6y1a0pqlx1rioe3v" class="export-section">
    
    <div class="export-section__body"><h1>ErrorSupport</h1>
<p><code>ErrorSupport</code> is the base class for <code>StaticForgeBuilder</code>, <code>StaticForgeReader</code>, and <code>StaticForgeArchive</code>.  <br>It provides a simple error collection system with optional formatted prefixes.</p>
<h2>API</h2>
<div class="code-block-wrapper"><pre class="syntax-definition-highlight"><span class="token-type_type">bool</span><span class="token-type_other"> </span><span class="token-type_function">IsValid</span><span class="token-type_punctuation">()</span><span class="token-type_other"> </span><span class="token-type_keyword">const</span><span class="token-type_punctuation">;</span><span class="token-type_other">    </span><span class="token-type_comment">// true if no errors were added</span>
<span class="token-type_namespace">std</span><span class="token-type_operator">::</span><span class="token-type_type">string</span><span class="token-type_other"> </span><span class="token-type_function">GetError</span><span class="token-type_punctuation">();</span><span class="token-type_other">  </span><span class="token-type_comment">// returns all collected errors as a single string</span></pre><div class="code-language-tag">cpp</div></div>
<h2>Header mode</h2>
<p>The constructor takes a boolean <code>hasHeader</code>.</p>
<p>When enabled, the first error is prefixed with:</p>
<div class="code-block-wrapper"><pre><code>[Error]:</code></pre><div class="code-language-tag">txt</div></div>
<p>Additional errors are indented for readability.</p>
<p>Example:</p>
<div class="code-block-wrapper"><pre><code>[Error]: Failed to load archive
&gt;        Failed to read header
&gt;        Invalid magic value</code></pre><div class="code-language-tag">txt</div></div>
<p><code>HAS_HEADER</code> is a constant with the value <code>true</code> and is used by:</p>
<ul><li><code>StaticForgeBuilder</code></li><li><code>StaticForgeReader</code></li><li><code>StaticForgeArchive</code></li></ul>
<p>Internal helper classes such as <code>StaticForgeMeta</code> usually disable this mode and emit raw messages without formatting.</p>
<h2>Error accumulation</h2>
<p>Errors are accumulated in insertion order.</p>
<p>Each call to <code>AddError()</code> appends a new entry to the internal error list.  <br><code>GetError()</code> combines all stored messages into a single newline-separated string.</p></div>
  </section>

  var firstNode = {"id":"node_mqxxat6y11ul8xo16n3dqv","tabId":"tab_mqxxat6yfsydmz1fj4cu7"};
  var searchIndex = [{"nodeId":"node_mqxxat6y11ul8xo16n3dqv","tabId":"tab_mqxxat6yfsydmz1fj4cu7","title":"Getting Started","headings":["Getting Started","What you get","Typical workflow"],"content":"StaticForge is an asset archive system for bundling and loading game files. It combines multiple files into a compact container that can be efficiently read at runtime. - A command-line tool ( ) to pack your assets during your build process - A C++ library ( ) to load assets from files at runtime 1. Organize your asset folders 2. Optionally add files to control how folders are grouped into archives 3. Run to pack your assets into one or more files 4. At runtime, use and to load assets by path --- Tip: files are binary and not meant to be edited manually. Always rebuild them from source assets using the tool."},{"nodeId":"node_mqxxat6y1fcbqfva3lj1l","tabId":"tab_mqxxat6yfsydmz1fj4cu7","title":"Packing Assets","headings":["Packing Assets","Basic usage","Specifying an archive name","Multiple source folders","Creating the output directory automatically","Verbose output"],"content":"Use to pack a folder of assets into a archive. This scans recursively and writes the archive to . By default the archive is named . Use to override: This produces . can be repeated to include multiple directories: or If the output directory doesn't exist yet, add : Add (or ) to print detailed information about every file processed:"},{"nodeId":"node_mqxxat6yher3crulfll","tabId":"tab_mqxxat6yfsydmz1fj4cu7","title":"Meta Files","headings":["Meta Files","File format","pack all UI assets together","Supported parameters","How it works","Fallback","storenames override"],"content":"Meta files let you split assets from a single source tree into multiple archives automatically. A meta file has the extension and uses a simple semicolon-terminated key-value syntax: Each statement is a pair. Whitespace around and is ignored. Comments start with and run to the end of the line: | Key | Type | Required | Description | |--------------|----------|----------|-----------------------------------------------------------------| | | string | yes | Name for the archive produced from this directory | | | string[] | no | Comma-separated list of file extensions to skip (e.g. ) | | | bool | no | Store original filenames in the archive for debug inspection | | | bool | no | Compresses files larger than 4096 bytes before storing them in the archive. | Example with all parameters: When the tool scans your source directories it looks for files. Every asset file in the same directory (or any subdirectory) is then packed into the archive named in that meta file. Excluded extensions are skipped entirely. Running the tool on produces: - - - (for everything without a meta file) Files that are not covered by any meta file are packed into the archive name set with (default: ). If is passed on the command line, name storage is enabled globally for all archives — even those whose meta file sets . The meta value only takes effect when the CLI flag is not set."},{"nodeId":"node_mqxxat6y1fwh7al1k5upx","tabId":"tab_mqxxat6yfsydmz1fj4cu7","title":"Inspecting Archives","headings":["Inspecting Archives","Basic info","Inspecting multiple archives at once","Verbose index listing","Name table"],"content":"Use to display header and index information of one or more existing files without extracting anything. Output: can be repeated to inspect several archives in one invocation: Each archive is printed in sequence with a separator between them. Add to also print every index entry: Output includes a line per file showing its hash, byte offset, size, and checksum: If the archive was built with (or in the meta file), the inspector also prints the name table, showing the original relative path for each entry. Note: Without name storage the index only contains hashes. The original path is not recoverable from the archive alone — keep your source assets."},{"nodeId":"node_mqxxat6yhtcphl1n5fsq9","tabId":"tab_mqxxat6yfsydmz1fj4cu7","title":"Loading Assets at Runtime","headings":["Loading Assets at Runtime","Opening an archive","Loading a file by path","Managing the file stream","Memory-mapped access","Compression","Error handling"],"content":"At runtime, use to open a file and to load individual assets. Pass the relative path of the file exactly as it appeared under the source directory: Important: The asset path must exactly match the path relative to the source root. Slashes are normalized internally, but typos or case mismatches will prevent the asset from being found. After succeeds, the archive's file stream is open. reopens it automatically if it was closed. You can control this manually: For better read performance, the archive can be opened using memory mapping instead of a file stream. This avoids repeated / calls and lets the OS manage page caching. returns a non-owning directly into mapped memory — no allocation or copy needed. The view becomes invalid as soon as is called. Important: Memory-mapped access is not supported for compressed assets . Calling or on a compressed entry will return an error. Use (stream-based) instead, which handles decompression automatically. Assets can be stored compressed inside an archive. This is transparent when using the stream-based API — detects compressed entries and decompresses them automatically before returning the data: Internally, compressed archives use per-block framing: each 4096-byte chunk is compressed independently and prefixed with its compressed and original size. This means the decompressor never needs to hold the entire file in memory at once. Whether an entry is compressed can be determined from the index — if the entry is compressed, otherwise it is stored raw. | Access method | Uncompressed | Compressed | |----------------------|:------------:|:-------------------:| | | ✅ | ✅ (auto-decompress) | | | ✅ | ❌ not supported | | | ✅ | ❌ not supported | Both and expose error messages. Always check the return value and read when it returns :"},{"nodeId":"node_mqxxat6y4wn1v0cx7zsh","tabId":"tab_mqxxat6yfsydmz1fj4cu7","title":"Building Archives in Code","headings":["Building Archives in Code","Minimal example","Multiple source paths","Fluent API","Debug mode"],"content":"Instead of using the command-line tool you can drive the build process directly from C++ using . or add them one at a time: All setters return so they can be chained: prints detailed progress to - the same output as in the CLI tool."},{"nodeId":"node_mqxxat6ydi3e721h773b2","tabId":"tab_mqxxat6yfsydmz1fj4cu7","title":"CLI Reference","headings":["CLI Reference","Arguments","Modes","storenames priority"],"content":"Quick reference for all arguments. | Argument | Short | Description | Type | Default | Multi | |-----------------|---------|----------------------------------------------------------------------------|----------|---------|-------| | | | Source path(s) of the files to be packed (can be specified multiple times) | filepath | — | yes | | | | Output directory for the file | filepath | — | no | | | | Default archive name when no file is found | string | | no | | | | Create the output directory if it does not exist | bool | false | no | | | | Display header and index info of a file (can be repeated) | filepath | — | yes | | | | Enable debug/verbose console output | bool | false | no | | | | Store original filenames in all archives for debug inspection | bool | false | no | | | | Compresses files larger than 4096 bytes before storing them in the archive | bool | false | no | | | | Show this help message | — | — | no | Exactly one mode must be active per invocation. Modes are determined by which arguments are provided: | Mode | Required arguments | |-------|---------------------------------| | pack | and | | info | | | help | | Combining arguments from multiple modes (e.g. together with ) is an error. When is set on the command line, name storage is forced on for every archive regardless of what the file specifies. The meta-file value of is only used when the CLI flag is absent."},{"nodeId":"node_mqxxat6y10i4iz813omdlk","tabId":"tab_mqxxat6ymu9lpd15crqng","title":"Architecture","headings":["Architecture","StaticForgeCore","StaticForgeTool","Dependency graph"],"content":"StaticForge is split into two main components. The core static library. Contains all format logic and is linked by both the tool and any consuming application: - Archive format definition and binary layout - - writes files - - reads and validates files - - runtime handle for an open archive - Meta file parsing ( ) - Internal helpers: hashing, alignment, endian handling, error support The CLI executable. Wraps with argument parsing and three modes: pack, info, help. Does not contain any format logic itself. The tool-side classes ( , meta parsing) are compiled into Core but an application that only reads archives still links the same library - there is currently no separate runtime-only build target."},{"nodeId":"node_mqxxat6y6g15qmm3z2y3","tabId":"tab_mqxxat6ymu9lpd15crqng","title":"File Format","headings":["File Format","Layout","Header","Index entry","Data blocks","Name Table Header","Name Table Entry","Name Table String Data","Alignment"],"content":"A file consists of three required regions and two optional regions written sequentially: Header , Index , Data , and — when name storage is enabled — Name Table Header , Name Table Entries , and Name Table String Data . Magic bytes followed by six fields. Written little-endian on all platforms. | Field | Type | Description | |-------------------------|------------|-----------------------------------------------------------------| | | | Always , , , | | | | Format version (currently ) | | | | Number of files in this archive | | | | Byte offset to the start of the index | | | | Total size of the index in bytes | | | | Byte offset to the start of data | | | | Byte offset to the Name Table Header, or if not present | One entry per file, stored contiguously starting at . | Field | Type | Description | |----------------------|------------|------------------------------------------------------------------------------------------| | | | FNV-1a hash of the relative file path | | | | Byte offset of the file's data block relative to | | | | Original (uncompressed) file size in bytes | | | | Total compressed bytes on disk, excluding framing headers. means stored uncompressed | | | | Padding bytes appended after the file data to reach the next 4096-byte boundary | | | | FNV-1a checksum of the data as written on disk (covers framing headers + compressed data)| Each file occupies one data block starting at . The block is always padded with zero bytes to the next 4096-byte boundary; the padding size is stored in . When the block contains the raw file bytes verbatim. When the block contains a sequence of independently compressed chunks: Each chunk has the following layout: Chunks are produced by splitting the original file into 4096-byte pieces and compressing each piece independently. The decompressor reads chunks sequentially until bytes consumed equals . Because each chunk carries its own original size, no global decompressed-size context is needed per chunk. The FNV-1a checksum covers all chunk bytes as written on disk — framing headers included — so integrity is verified before any decompression takes place. Note: Compressed data blocks cannot be accessed via memory mapping. Use the stream-based API which handles decompression automatically. Present only when the archive was built with name storage enabled. Located at . | Field | Type | Description | |--------------------|------------|--------------------------------------------------------| | | | Byte offset to the first Name Table Entry | | | | Byte offset to the start of Name Table String Data | One entry per file, stored contiguously starting at . | Field | Type | Description | |--------------|------------|--------------------------------------------------------------------------------| | | | FNV-1a hash of the path (matches in the corresponding index entry) | | | | Length of the UTF-8 path string in bytes | | | | Byte offset within the String Data region where this path starts | Raw UTF-8 path strings packed end-to-end with no separators. To read a filename, seek to and read bytes. - The header region is padded to 32 bytes ( ). - Every file data block is padded to 4096 bytes ( ) — one filesystem page. - Padding bytes are always zero. This alignment ensures that file offsets are always multiples of 4096, which allows direct memory-mapped access for uncompressed assets without additional alignment work."},{"nodeId":"node_mqxxat6yt92zfj1uzirhr","tabId":"tab_mqxxat6ymu9lpd15crqng","title":"Hashing","headings":["Hashing","Filename hashing","Data checksum","Path format"],"content":"StaticForge uses FNV-1a (Fowler–Noll–Vo) for two purposes: filename lookup and data integrity. When the builder packs a file, the relative path string (e.g. ) is hashed to a and stored in the index as . At runtime, hashes the key string you pass in and looks it up in the index map. The original string is never stored in the archive. Implications: - Lookups are O(1) via . - The archive cannot list filenames - only validate whether a known key exists. - Hash collisions between two different paths in the same archive are detected at build time and cause an error. During packing, each file's raw bytes are fed through FNV-1a with the initial value to produce a checksum. This is written back into the index entry after the data is flushed. When loading, recomputes the checksum over the read bytes and compares it to the stored value. A mismatch causes to return with an error message. Use a path relative to the source root used during packing."},{"nodeId":"node_mqxxat6y1xsg4ck16t30ny","tabId":"tab_mqxxat6ymu9lpd15crqng","title":"Build Process","headings":["Build Process","1. CheckFilepaths","2. ScanFiles","3. CreateGroups","Write phases summary","Compression","Overflow safety"],"content":"runs three internal phases in sequence. Validates that all source paths exist and that the output path is a directory (no file extension). If was called and the directory is missing, it is created here. Recursively iterates every source path in two passes: Pass 1 — Meta collection: Collects all files and builds a mapping. Each entry stores the archive name, excluded extensions, and the and flags. Pass 2 — File assignment: Iterates all non-meta files, computes their relative path, hashes it with FNV-1a, and assigns each file to the appropriate by walking up the directory tree until a meta entry is found. Falls back to the default archive name if no meta file applies. For each file the builder also: - Detects hash collisions between files in the same group and reports them as errors. - Applies the and overrides: if a global flag is set, it is forced on even when the meta file sets it to . For each the following phases run in order: CalculateDataStart — computes the byte offset at which file data begins. This is the sum of the aligned header size and the index table size, rounded up to the next 4096-byte boundary. WriteData — opens the output file and writes bytes of zero-padding to reserve space for the header and index, then writes all file data blocks. During this pass, , , , and are filled in on each file entry so the index can be written correctly afterwards. WriteHeader — seeks back to offset and writes the struct, padded to 32 bytes. WriteIndex — writes one per file directly after the header. Checksums computed during are included here — no second seek is needed. BuildNameTable (optional, when storenames is enabled) — computes the byte layout of the Name Table Header, Name Table Entries, and String Data region. Offsets are appended after the last data block. WriteNameTable (optional) — seeks to (set at the end of ) and writes the Name Table Header, Name Table Entries, and raw UTF-8 string data. | Phase | Seeks to | What it writes | |-------------------|-------------------|------------------------------------------------------------------------------| | | (start) | zero-padding, then all file data blocks in order | | | (seekp back) | struct padded to 32 bytes | | | after header | One per file, including computed checksums | | | (seekp forward) | Name Table Header, Name Table Entries, raw UTF-8 string data | When compression is enabled for an archive group (via the meta file or the global flag), files larger than one 4096-byte block are compressed. Compression is applied per-block during : - Each 4096-byte read chunk is compressed independently. - Each compressed block is prefixed with a framing header: . - The raw compressed bytes follow immediately after the framing header. - in the index entry is set to the total number of compressed bytes written (excluding framing headers). A value of means the entry is stored uncompressed. The per-block approach means the decompressor can process one chunk at a time without buffering the entire file. The FNV-1a checksum covers the framing headers and compressed block data as written, so integrity verification happens before decompression. All size and offset arithmetic uses checked helpers that return on overflow instead of wrapping silently: | Helper | Description | |-----------------|--------------------------------------------------------| | | Addition with overflow check | | | Multiplication with overflow check | | | Rounds up to a power-of-two alignment, overflow-safe | | | Returns the aligned header size via | Any overflow causes to return with a descriptive error."},{"nodeId":"node_mqxxat6yw42uk51d7g8fd","tabId":"tab_mqxxat6ymu9lpd15crqng","title":"Meta File Parser","headings":["Meta File Parser","Syntax","this is a comment","Tokenizer","Parser","Error suggestions","Supported parameters","Value parsing"],"content":"Meta files use a minimal custom format parsed by inside . Each statement is a key-value pair terminated by a semicolon: Multiple statements can appear in any o   var currentTabId = null;
  var currentNodeId = null;
  var isTransitioning = false;
  var dynamicContent = document.getElementById('dynamicContent');

  // -- Search state --------------------------------------------------------
  var searchInput   = document.getElementById('searchInput');
  var searchResults = document.getElementById('searchResults');
  var searchResultsList = document.getElementById('searchResultsList');
  var searchToggle  = document.getElementById('searchIncludeTabs');
  var searchDebounceTimer = null;

  // -- Helper: find node's tab --------------------------------------------
  function getNodeTabId(nodeId) {
    var node = allNodes.find(function(n) { return n.id === nodeId; });
    return node ? node.tabId : null;
  }

  // -- Header scroll-hide behaviour --------------------------------------
  var docHeader = document.getElementById('docHeader');
  if (docHeader && docHeader.classList.contains('header-scroll-hide')) {
    var lastScrollY = 0;
    var scrollTarget = document.querySelector('.dynamic-content') || window;
    var onScroll = function() {
      var y = (scrollTarget === window) ? window.scrollY : scrollTarget.scrollTop;
      if (y > lastScrollY && y > 60) {
        docHeader.classList.add('hidden-scrolled');
      } else {
        docHeader.classList.remove('hidden-scrolled');
      }
      lastScrollY = y;
    };
    scrollTarget.addEventListener('scroll', onScroll, { passive: true });
  }

  // -- TOC builder --------------------------------------------------------
  var tocLinks = document.getElementById('tocLinks');
  function buildToc() {
    if (!tocLinks) return;
    var headings = dynamicContent.querySelectorAll('h1,h2,h3,h4');
    tocLinks.innerHTML = '';
    headings.forEach(function(h) {
      if (!h.id) h.id = 'h-' + Math.random().toString(36).slice(2, 7);
      var a = document.createElement('a');
      a.className = 'toc-link';
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      a.dataset.level = h.tagName[1];
      a.addEventListener('click', function(e) {
        e.preventDefault();
        h.scrollIntoView({ behavior: 'smooth' });
      });
      tocLinks.appendChild(a);
    });
  }

  // -- Load node content from template with crossfade ---------------------
  function loadNode(nodeId, updateUrl) {
    if (isTransitioning) return;
    if (nodeId === currentNodeId) return;

    var template = document.getElementById('tmpl-' + nodeId);
    if (!template) {
      console.warn('Template not found for node', nodeId);
      return;
    }

    var newTabId = getNodeTabId(nodeId);
    if (!newTabId) return;

    // Tab muss aktiv sein (sonst wechsle zuerst den Tab)
    var activeTabSection = document.querySelector('.sidebar-section.active');
    if (activeTabSection && activeTabSection.dataset.tab !== newTabId) {
      // Tab wechseln, dann diesen Node laden
      switchTab(newTabId, function() {
        loadNode(nodeId, updateUrl);
      });
      return;
    }

    isTransitioning = true;

    // Crossfade: ausblenden
    dynamicContent.classList.add('fade-out');

    setTimeout(function () {
      // Inhalt austauschen
      var clone = document.importNode(template.content, true);
      dynamicContent.innerHTML = '';
      dynamicContent.appendChild(clone);
      buildToc();

      // Aktive Klasse in Sidebar aktualisieren
      document.querySelectorAll('.nav-row').forEach(function(row) {
        row.classList.remove('active');
      });
      document.querySelectorAll('.nav-row[data-node-id="' + nodeId + '"]').forEach(function(row) {
        row.classList.add('active');
      });

      currentNodeId = nodeId;
      currentTabId = newTabId;

      // URL-Hash aktualisieren (ohne History-Eintrag wenn nicht gewünscht)
      if (updateUrl !== false && window.location.hash !== '#' + nodeId) {
        history.pushState(null, '', '#' + nodeId);
      }

      // Einblenden
      dynamicContent.classList.remove('fade-out');
      setTimeout(function () {
        isTransitioning = false;
      }, 50);
    }, 150);
  }

  // -- Tab switching (erweitert: lädt ersten Node des neuen Tabs) -----------
  function switchTab(tabId, callback) {
    // Panels existieren nicht mehr, wir steuern nur Sidebar und Buttons
    document.querySelectorAll('.sidebar-section').forEach(function (s) {
      s.classList.toggle('active', s.dataset.tab === tabId);
    });
    document.querySelectorAll('.tab-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.tab === tabId);
    });

    // Ersten Node dieses Tabs finden
    var firstNodeInTab = allNodes.find(function(n) { return n.tabId === tabId; });
    if (firstNodeInTab) {
      loadNode(firstNodeInTab.id, true);
    } else {
      dynamicContent.innerHTML = '<div class="main"><p>No content in this tab.</p></div>';
      currentNodeId = null;
      currentTabId = tabId;
      if (callback) callback();
    }
    if (callback) callback();
    try { sessionStorage.setItem('_docActiveTab', tabId); } catch (e) {}
  }

  // -- Nav group toggle (unverändert) --------------------------------------
  function toggleNavGroup(groupId) {
    var group = document.getElementById(groupId);
    if (!group) return;
    group.classList.toggle('collapsed');
  }

  // -- Search helpers ------------------------------------------------------

  /** Escapes a string for safe insertion as HTML text content. */
  function _escHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /**
   * Returns the HTML-escaped string with all occurrences of query
   * wrapped in <mark> tags for highlighting.
   */
  function _highlight(text, query) {
    if (!query || !text) return _escHtml(text);
    var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp('(' + escaped + ')', 'gi');
    return _escHtml(text).replace(re, '<mark>$1</mark>');
  }

  /**
   * Returns a short excerpt of text centred around the first occurrence
   * of query, padded by radius characters on each side.
   */
  function _getSnippet(text, query, radius) {
    radius = radius || 80;
    if (!text) return '';
    if (!query) return text.slice(0, radius * 2);
    var idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx < 0) return text.slice(0, radius * 2);
    var start = Math.max(0, idx - radius);
    var end   = Math.min(text.length, idx + query.length + radius);
    return (start > 0 ? '\u2026' : '') + text.slice(start, end) + (end < text.length ? '\u2026' : '');
  }

  /**
   * Scores a single index entry against the query string.
   * Returns { score, matchedHeading }.
   *
   * Score weights:
   *   title match   +100
   *   heading match  +50  (first matched heading captured)
   *   content match  +10
   */
  function _scoreEntry(entry, query) {
    var ql = query.toLowerCase();
    var score = 0;
    var matchedHeading = null;

    if (entry.title.toLowerCase().indexOf(ql) >= 0)
      score += 100;

    for (var i = 0; i < entry.headings.length; i++) {
      if (entry.headings[i].toLowerCase().indexOf(ql) >= 0) {
        score += 50;
        if (!matchedHeading) matchedHeading = entry.headings[i];
      }
    }

    if (entry.content.toLowerCase().indexOf(ql) >= 0)
      score += 10;

    return { score: score, matchedHeading: matchedHeading };
  }

  /**
   * Executes a search over the index and renders results into the
   * floating results panel. Hides the panel when query is empty.
   */
  function _runSearch(query) {
    if (!searchResultsList) 
      return;

    query = (query || '').trim();

    if (query.length < 2) {
      searchResults.classList.remove('visible');
      searchResultsList.innerHTML = '';
      return;
    }

    // Scope: current tab only, or all tabs when toggle is checked.
    var crossTab = searchToggle ? searchToggle.checked : false;
    var pool = crossTab
      ? searchIndex
      : searchIndex.filter(function(e) { return e.tabId === currentTabId; });

    var scored = [];
    for (var i = 0; i < pool.length; i++) {
      var res = _scoreEntry(pool[i], query);
      if (res.score > 0)
        scored.push({ entry: pool[i], score: res.score, matchedHeading: res.matchedHeading });
    }

    scored.sort(function(a, b) { return b.score - a.score; });
    var top = scored.slice(0, 20);

    if (top.length === 0) {
      searchResultsList.innerHTML = '<div class="search-no-results">No results found</div>';
      searchResults.classList.add('visible');
      return;
    }

    searchResultsList.innerHTML = top.map(function(item) {
      var e = item.entry;
      var snippet = _getSnippet(e.content, query, 80);
      var headingHtml = item.matchedHeading
        ? '<div class="search-result-heading">' + _highlight(item.matchedHeading, query) + '</div>'
        : '';
      return '<div class="search-result" data-node-id="' + _escHtml(e.nodeId) + '">'
        + '<div class="search-result-title">'   + _highlight(e.title, query) + '</div>'
        + headingHtml
        + '<div class="search-result-preview">' + _highlight(snippet, query) + '</div>'
        + '</div>';
    }).join('');

    searchResults.classList.add('visible');
  }

  // -- Event handling -----------------------------------------------------

  // Sidebar-Klicks (Delegation)
  document.body.addEventListener('click', function(e) {
    var link = e.target.closest('.nav-row[data-node-id]');
    if (link && link.getAttribute('data-node-id')) {
      e.preventDefault();
      var nodeId = link.getAttribute('data-node-id');
      loadNode(nodeId, true);
    }
  });

  // Chevron-Klicks (statt inline onclick)
  document.body.addEventListener('click', function(e) {
    var btn = e.target.closest('.nav-chevron-btn');
    if (btn && btn.dataset.toggleGroup) {
      e.preventDefault();
      toggleNavGroup(btn.dataset.toggleGroup);
      return;
    }

    var link = e.target.closest('.nav-row[data-node-id]');
    if (link && link.getAttribute('data-node-id')) {
      e.preventDefault();
      loadNode(link.getAttribute('data-node-id'), true);
    }
  });

  // Tab-Klicks
  var tabNav = document.getElementById('tabNav');
  if (tabNav) {
    tabNav.addEventListener('click', function (e) {
      var btn = e.target.closest('.tab-btn');
      if (btn && btn.dataset.tab) {
        switchTab(btn.dataset.tab);
      }
    });
  }

  var tabNavContainer = document.getElementById('tabNavContainer');
  if (tabNavContainer) {
    // Convert vertical scroll to horizontal scroll
    tabNavContainer.addEventListener('wheel', (e) => {
      if (e.deltaY === 0)
        return;
    
      e.preventDefault(); // prevent vertical scroll
      tabNavContainer.scrollBy({
        left: e.deltaY,
        behavior: 'smooth'
      });
    }, { passive: false });
  }

  // Hash-Änderungen (z. B. Browser Zurück/Vorwärts)
  window.addEventListener('hashchange', function() {
    var hash = window.location.hash.slice(1);
    if (hash && allNodes.some(function(n) { return n.id === hash; })) {
      loadNode(hash, false);
    } else if (firstNode) {
      loadNode(firstNode.id, true);
    }
  });

  // -- Search event handling ----------------------------------------------

  if (searchInput) {
    // Debounced input → run search after 120 ms of silence.
    searchInput.addEventListener('input', function() {
      clearTimeout(searchDebounceTimer);
      var val = searchInput.value;
      searchDebounceTimer = setTimeout(function() {
        _runSearch(val);
      }, 120);
    });

    // Re-show results on focus if there is a pending query.
    searchInput.addEventListener('focus', function() {
      if (searchInput.value.trim().length >= 2 && searchResultsList)
        searchResults.classList.add('visible');
    });
  }

  // Result clicks: navigate to node and close panel.
  if (searchResultsList) {
    searchResultsList.addEventListener('click', function(e) {
      var item = e.target.closest('.search-result');
      if (!item) 
        return;
      
      var nodeId = item.getAttribute('data-node-id');
      searchResults.classList.remove('visible');
      
      if (searchInput) 
        searchInput.value = '';
      if (nodeId)
        loadNode(nodeId, true);
    });
  }

  // Close results when clicking anywhere outside the search widget.
  document.addEventListener('click', function(e) {
    if (!searchResultsList) 
      return;
    var docSearch = document.getElementById('docSearch');
    if (docSearch && !docSearch.contains(e.target))
      searchResults.classList.remove('visible');
  });

  // -- Initialisierung (wie gehabt) ---------------------------------------
  var savedTab = null;
  try { savedTab = sessionStorage.getItem('_docActiveTab'); } catch (e) {}
  var initialTab = (savedTab && allNodes.some(function(n) { return n.tabId === savedTab; })) ? savedTab : (firstNode ? firstNode.tabId : null);
  
  var hashNodeId = window.location.hash.slice(1);
  var initialNodeId = null;
  if (hashNodeId && allNodes.some(function(n) { return n.id === hashNodeId; })) {
    initialNodeId = hashNodeId;
  } else if (firstNode) {
    initialNodeId = firstNode.id;
  }

  if (initialTab) {
    document.querySelectorAll('.sidebar-section').forEach(function (s) {
      s.classList.toggle('active', s.dataset.tab === initialTab);
    });
    document.querySelectorAll('.tab-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.tab === initialTab);
    });
  }

  if (initialNodeId) {
    loadNode(initialNodeId, false);
  }
})();</script>
